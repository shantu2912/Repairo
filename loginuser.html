<!DOCTYPE html>
<html lang="en" class="scroll-smooth" style="top: 0px !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FixZen - Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .fixzen-input { width: 100%; padding: 0.875rem 1.25rem; border-radius: 0.75rem; border: 1px solid #E5E7EB; background: #F9FAFB; font-size: 0.875rem; font-weight: 600; outline: none; }
        .btn-primary { width: 100%; padding: 1rem; border-radius: 0.75rem; background-color: #A07D54; color: white; font-weight: 800; text-transform: uppercase; }
        .btn-google { width: 100%; padding: 1rem; border-radius: 0.75rem; background-color: white; border: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
        .otp-box { width: 100%; text-align: center; letter-spacing: 0.5em; font-size: 1.5rem; border: 2px dashed #A07D54; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans bg-gray-50"
x-data="{
    view: 'login',
    authMethod: 'phone',
    step: 'form',
    loading: false,
    message: '',
    form: { phone: '', otp: '' },

    async loginWithGoogle() {
        this.loading = true;
        try {
            const provider = new window.GoogleAuthProvider();
            await window.signInWithPopup(window.auth, provider);
            window.location.href = 'index.html';
        } catch (err) { this.message = err.message; } finally { this.loading = false; }
    },

    async sendOtp() {
        if (this.form.phone.length < 10) { this.message = 'ENTER VALID 10-DIGIT NUMBER'; return; }
        this.loading = true;
        try {
            window.recaptchaVerifier = new window.RecaptchaVerifier(window.auth, 'recaptcha-container', { 'size': 'invisible' });
            window.confirmationResult = await window.signInWithPhoneNumber(window.auth, '+91' + this.form.phone, window.recaptchaVerifier);
            this.step = 'otp';
        } catch (err) { this.message = err.message; } finally { this.loading = false; }
    },

    async verifyOtp() {
        this.loading = true;
        try {
            await window.confirmationResult.confirm(this.form.otp);
            window.location.href = 'index.html';
        } catch (err) { this.message = 'INVALID OTP'; } finally { this.loading = false; }
    }
}">

<div class="w-full max-w-md px-4 py-8">
    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold uppercase tracking-tight">FixZen Access</h1>
        </div>

        <div id="recaptcha-container"></div>

        <div x-show="step === 'form'">
            <div class="flex gap-2 mb-6">
                <button @click="authMethod = 'google'" :class="authMethod === 'google' ? 'bg-amber-700 text-white' : 'bg-gray-200'" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase">Google</button>
                <button @click="authMethod = 'phone'" :class="authMethod === 'phone' ? 'bg-amber-700 text-white' : 'bg-gray-200'" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase">Phone</button>
            </div>

            <template x-if="authMethod === 'google'">
                <button @click="loginWithGoogle()" class="btn-google">Continue with Google</button>
            </template>

            <template x-if="authMethod === 'phone'">
                <div class="space-y-4">
                    <input type="tel" x-model="form.phone" maxlength="10" class="fixzen-input" placeholder="Enter 10-digit Phone">
                    <button @click="sendOtp()" class="btn-primary" x-text="loading ? 'Sending...' : 'Send OTP'"></button>
                </div>
            </template>
        </div>

        <div x-show="step === 'otp'" x-cloak class="space-y-4">
            <input type="text" x-model="form.otp" maxlength="6" class="fixzen-input otp-box" placeholder="000000">
            <button @click="verifyOtp()" class="btn-primary" x-text="loading ? 'Verifying...' : 'Verify'"></button>
        </div>

        <p x-text="message" class="text-red-500 text-[10px] font-bold text-center mt-4"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 1. ADD YOUR KEYS HERE
   const firebaseConfig = {
  apiKey: "AIzaSyAENmRPNObOBw0QJy8P5PmUpvehOKmWvpk",
  authDomain: "fixzenix.firebaseapp.com",
  projectId: "fixzenix",
  storageBucket: "fixzenix.firebasestorage.app",
  messagingSenderId: "957694304403",
  appId: "1:957694304403:web:3f836f45741ab5163e6d66",
  measurementId: "G-0YSJ9KPVRF"
};

    const app = initializeApp(firebaseConfig);
    window.auth = getAuth(app);
    window.signInWithPopup = signInWithPopup;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.RecaptchaVerifier = RecaptchaVerifier;
    window.signInWithPhoneNumber = signInWithPhoneNumber;
</script>
</body>
</html>

<html lang="en" class="scroll-smooth" style="top: 0px !important;">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

                    colors: {

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #F8F5F0; font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; }

        .fixzen-input {
            width: 100%; padding: 1rem 1.25rem; border-radius: 1.2rem;
            border: 2px solid #DFD4C3; background: white;
            font-size: 0.875rem; font-weight: 600; outline: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);

        }
        .fixzen-input:focus { border-color: #A07D54; box-shadow: 0 0 0 4px rgba(160, 125, 84, 0.1); }
        .fixzen-input.error { border-color: #EF4444; background-color: #FEF2F2; }
        .fixzen-input.success { border-color: #10B981; }
        
        .input-label {
            display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; color: #A07D54; margin-bottom: 0.5rem; margin-left: 0.5rem;
        }
        .btn-primary {
            width: 100%; padding: 1.1rem; border-radius: 1.2rem; background-color: #5D5646;
            color: white; font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.15em; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4a4537; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(93,86,70,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .loader {
            border: 2px solid #f3f3f3; border-top: 2px solid #A07D54;
            border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .lang-btn {
            flex: 1; padding: 0.75rem 0.5rem; border-radius: 1rem;
            border: 2px solid #DFD4C3; background: white;
            font-weight: 700; font-size: 0.8rem; transition: all 0.25s ease;
            cursor: pointer; text-align: center; color: #5D5646;
            font-family: 'Noto Sans Devanagari', 'Plus Jakarta Sans', sans-serif;
        }
        .lang-btn:hover { border-color: #A07D54; background: rgba(160,125,84,0.05); }
        .lang-btn.active { border-color: #5D5646; background: #5D5646; color: white; }
        .deva { font-family: 'Noto Sans Devanagari', sans-serif; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans" x-data="authApp()">

    </div>

    <div class="bg-white/90 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-2xl border border-white">

        <div x-show="step==='lang'" class="space-y-6 text-center">

            </div>

            <div class="flex gap-3 mt-4">
                <button @click="setLang('en')" :class="lang==='en' ? 'active' : ''" class="lang-btn">

                    <span class="lang-sub">English</span>
                </button>
                <button @click="setLang('hi')" :class="lang==='hi' ? 'active' : ''" class="lang-btn">
                    <span class="lang-native deva">हिंदी</span>
                    <span class="lang-sub">Hindi</span>
                </button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'active' : ''" class="lang-btn">
                    <span class="lang-native deva">मराठी</span>
                    <span class="lang-sub">Marathi</span>
                </button>
            </div>

            <button @click="proceedFromLang()" class="btn-primary mt-2">

                <button @click="setLang('hi')" :class="lang==='hi' ? 'bg-brand-olive text-white' : 'text-brand-olive/50'" class="text-[10px] font-bold px-3 py-1 rounded-full border border-brand-beige transition-all deva">हि</button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'bg-brand-olive text-white' : 'text-brand-olive/50'" class="text-[10px] font-bold px-3 py-1 rounded-full border border-brand-beige transition-all deva">म</button>
            </div>

            <h2 class="font-serif italic text-2xl text-brand-olive mb-6 deva" x-text="tx('welcome')"></h2>
            <button @click="isNewUser=true; step='auth'; resetErrors()" class="btn-primary deva" x-text="tx('create_account')"></button>
            <button @click="isNewUser=false; step='auth'; resetErrors()" class="btn-primary mt-3 !bg-brand-gold deva" x-text="tx('login')"></button>
        </div>

        <div x-show="step==='auth'" x-cloak>
            <div class="flex justify-end gap-2 mb-4">
                <button @click="setLang('en')" :class="lang==='en' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all">EN</button>
                <button @click="setLang('hi')" :class="lang==='hi' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all deva">हि</button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all deva">म</button>
            </div>

            <h2 class="font-serif italic text-2xl text-brand-olive text-center mb-6 deva" x-text="isNewUser ? tx('create_account') : tx('welcome_back')"></h2>

            <div class="space-y-4">
                <div x-show="isNewUser" class="space-y-4" x-collapse>
                    <div>
                        <label class="input-label deva" x-text="tx('full_name')"></label>
                        <input type="text" x-model="form.name" x-on:input="validateField('name')" class="fixzen-input deva" :class="{'error': errors.name, 'success': form.name.trim().length >= 3 && !errors.name}" :placeholder="tx('name_placeholder')">
                        <p x-show="errors.name" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('msg_name_req')"></p>
                    </div>
                    
                    <div>
                        <label class="input-label deva" x-text="tx('username')"></label>
                        <input type="text" x-model="form.user" x-on:input="validateField('user')" class="fixzen-input" :class="{'error': errors.user, 'success': form.user.trim().length > 0 && !errors.user}" :placeholder="tx('user_placeholder')">
                        <p x-show="errors.user" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_user_format')"></p>
                    </div>
                </div>

                <div>
                    <label class="input-label deva" x-text="tx('mobile')"></label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-gold font-bold text-sm select-none">+91</span>
                        <input type="tel" x-model="form.phone" x-on:input="validateField('phone')" maxlength="10" class="fixzen-input pl-14" :class="{'error': errors.phone, 'success': form.phone.trim().length === 10 && !errors.phone}" :placeholder="tx('phone_placeholder')">
                    </div>
                    <p x-show="errors.phone" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_phone')"></p>
                </div>

                <div>
                    <label class="input-label deva" x-text="tx('password')"></label>
                    <input type="password" x-model="form.pass" x-on:input="validateField('pass')" class="fixzen-input" :class="{'error': errors.pass, 'success': form.pass.length >= 6 && !errors.pass}" :placeholder="tx('pass_placeholder')">
                    <p x-show="errors.pass" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_pass')"></p>
                </div>

                <button @click="processForm()" class="btn-primary mt-6 shadow-lg deva" :disabled="loading">
                    <span x-show="!loading" x-text="isNewUser ? tx('create_account') : tx('sign_in')"></span>
                    <div x-show="loading" class="loader"></div>
                </button>

                <div x-show="message" class="p-3 bg-red-50 border border-red-200 rounded-xl mt-4 animate__animated animate__shakeX">
                    <p class="text-xs text-red-600 font-bold text-center leading-normal deva" x-text="message"></p>
                </div>

                <div class="mt-6 pt-6 border-t border-brand-beige/30 text-center">
                    <button @click="isNewUser = !isNewUser; resetErrors();" class="text-xs font-bold text-brand-gold hover:underline tracking-widest decoration-brand-gold/30 underline-offset-4 deva">
                        <span x-text="isNewUser ? tx('already_member') : tx('new_user')"></span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <p class="text-center text-[10px] text-brand-olive/30 font-bold mt-6 uppercase tracking-widest">
        FixZen © 2026
    </p>
</div>

<script>
    function authApp() {
        return {
            step: 'lang',
            isNewUser: false,
            loading: false,
            message: '',
            lang: localStorage.getItem('fixzen_lang') || 'en',
            form: { name:'', phone:'', user:'', pass:'' },
            errors: { name: false, phone: false, user: false, pass: false },

            t: {
                en: {
                    tagline: 'Premium Home Care', choose_lang: 'Choose Your Language', lang_continue: 'CONTINUE',
                    welcome: 'Welcome to FixZen', create_account: 'Create Account', login: 'Login',
                    full_name: 'Full Name', username: 'Username', password: 'Password', mobile: 'Mobile Number',
                    sign_in: 'Sign In', already_member: 'Already a member? Sign In', new_user: 'New User? Create Account',
                    name_placeholder: 'Rahul Sharma', user_placeholder: 'username', pass_placeholder: '••••••••', phone_placeholder: '9876543210',
                    err_phone: 'Must be a 10-digit Indian number starting with 6-9', err_exists: 'Mobile number already registered',
                    err_user_exists: 'Username is already taken', err_user_format: 'Use alphabets and numbers only (No spaces)',
                    err_not_found: 'Account not found with this mobile number', err_pass: 'Password must be at least 6 characters long',
                    err_login: 'Incorrect mobile number or password.', msg_name_req: 'Enter letters only (Min 3 characters, no numbers)',
                    welcome_back: 'Welcome Back'
                },
                hi: {
                    tagline: 'प्रीमियम होम केयर', choose_lang: 'अपनी भाषा चुनें', lang_continue: 'आगे बढ़ें',
                    welcome: 'FixZen में स्वागत है', create_account: 'नया खाता बनाएं', login: 'लॉगिन करें',
                    full_name: 'पूरा नाम', username: 'उपयोगकर्ता नाम', password: 'पासवर्ड', mobile: 'मोबाइल नंबर',
                    sign_in: 'साइन इन करें', already_member: 'पहले से सदस्य हैं? साइन इन करें', new_user: 'नए उपयोगकर्ता? खाता बनाएं',
                    name_placeholder: 'राहुल शर्मा', user_placeholder: 'उपयोगकर्ता नाम', pass_placeholder: '••••••••', phone_placeholder: '9876543210',
                    err_phone: '6-9 से शुरू होने वाला 10-अंकीय भारतीय नंबर दर्ज करें', err_exists: 'यह मोबाइल नंबर पहले से पंजीकृत है',
                    err_user_exists: 'यह उपयोगकर्ता नाम पहले से मौजूद है', err_user_format: 'केवल अक्षरों और अंकों का प्रयोग करें (स्पेस न दें)',
                    err_not_found: 'इस नंबर के साथ कोई खाता नहीं मिला', err_pass: 'पासवर्ड कम से कम 6 अक्षरों का होना चाहिए',
                    err_login: 'गलत मोबाइल नंबर या पासवर्ड। कृपया पुनः प्रयास करें।', msg_name_req: 'केवल अक्षर दर्ज करें (न्यूनतम 3 अक्षर, संख्याएं नहीं)',
                    welcome_back: 'वापसी पर स्वागत है'
                },
                mr: {
                    tagline: 'प्रीमियम होम केअर', choose_lang: 'तुमची भाषा निवडा', lang_continue: 'पुढे जा',
                    welcome: 'FixZen मध्ये स्वागत आहे', create_account: 'नवीन खाते तयार करा', login: 'लॉगिन करा',
                    full_name: 'पूर्ण नाव', username: 'वापरकर्ता नाव', password: 'पासवर्ड', mobile: 'मोबाइल नंबर',
                    sign_in: 'साइन इन करा', already_member: 'आधीच सदस्य आहात? साइन इन करा', new_user: 'नवीन वापरकर्ता? खाते तयार करा',
                    name_placeholder: 'राहुल शर्मा', user_placeholder: 'वापरकर्ता नाव', pass_placeholder: '••••••••', phone_placeholder: '9876543210',
                    err_phone: '6-9 ने सुरू होणारा वैध 10-अंकीय भारतीय नंबर प्रविष्ट करा', err_exists: 'हा मोबाईल नंबर आधीपासून नोंदणीकृत आहे',
                    err_user_exists: 'हे वापरकर्ता नाव आधीच घेतले आहे', err_user_format: 'फक्त अक्षरे आणि अंक वापरा (स्पेस देऊ नका)',
                    err_not_found: 'या नंबरसह खाते सापडले नाही', err_pass: 'पासवर्ड किमान 6 अक्षरांचा असावा',
                    err_login: 'चुकीचा मोबाईल नंबर किंवा पासवर्ड।', msg_name_req: 'फक्त अक्षरे प्रविष्ट करा (किमान 3 अक्षरे, संख्या नाही)',
                    welcome_back: 'पुन्हा स्वागत आहे'
                }
            },

            tx(key) { return (this.t[this.lang] || this.t['en'])[key] || key; },
            setLang(l) { this.lang = l; localStorage.setItem('fixzen_lang', l); },
            proceedFromLang() { this.step = 'choose'; },
            normalizePhone() { return '+91' + this.form.phone.trim(); },
            
            resetErrors() {
                this.message = '';
                this.form = { name:'', phone:'', user:'', pass:'' };
                this.errors = { name: false, phone: false, user: false, pass: false };
            },

            // INTERACTIVE STEP KEYSTROKE SANITIZATION LOGIC LAYER
            validateField(field) {
                this.message = '';
                let val = this.form[field] || '';

                if (field === 'name') {
                    this.form.name = val.replace(/[^a-zA-Z\s]/g, '');
                    this.errors.name = this.form.name.trim().length > 0 && this.form.name.trim().length < 3;
                }

                if (field === 'phone') {
                    const digits = this.form.phone.replace(/\D/g, '');
                    this.form.phone = digits; 
                    if (digits.length > 0) {
                        const firstDigit = parseInt(digits[0]);
                        this.errors.phone = firstDigit < 6 || isNaN(firstDigit) || (digits.length === 10 && !/^[6-9]\d{9}$/.test(digits));
                    } else {
                        this.errors.phone = false;
                    }
                }

                if (field === 'pass') {
                    this.errors.pass = this.form.pass.length > 0 && this.form.pass.length < 6;
                }

                if (this.isNewUser && field === 'user') {
                    const cleanUser = this.form.user.trim();
                    if (cleanUser.length > 0) {
                        const alphaNumericRegex = /^[a-zA-Z0-9]+$/;
                        this.errors.user = !alphaNumericRegex.test(cleanUser);
                    } else {
                        this.errors.user = false;
                    }
                }
            },

            async processForm() {
                const cleanPhone = this.form.phone.trim();
                const indianPhoneRegex = /^[6-9]\d{9}$/;

                this.errors.phone = !indianPhoneRegex.test(cleanPhone);
                this.errors.pass = !this.form.pass || this.form.pass.length < 6;
                
                if (this.isNewUser) {
                    this.errors.name = !this.form.name.trim() || this.form.name.trim().length < 3;
                    const alphaNumericRegex = /^[a-zA-Z0-9]+$/;
                    this.errors.user = !alphaNumericRegex.test(this.form.user.trim());
                }

                if (this.errors.phone || this.errors.pass || (this.isNewUser && (this.errors.name || this.errors.user))) {
                    this.message = 'Please correct the highlighted format errors before continuing.';
                    return;
                }

                this.loading = true;
                const phone = this.normalizePhone();

                try {
                    if (this.isNewUser) {
                        // Validate username uniqueness directly inside public table layout
                        const { data: nameUser, error: nameError } = await window.supabase
                            .from('profiles')
                            .select('id')
                            .eq('username', this.form.user.trim())
                            .maybeSingle();

                        if (nameError) throw nameError;

                        if (nameUser) {
                            this.errors.user = true;
                            this.message = this.tx('err_user_exists');
                            this.loading = false;
                            return;
                        }

                        // Validate phone availability parameters before initializing session bounds
                        const { data: phoneUser, error: phoneCheckError } = await window.supabase
                            .from('profiles')
                            .select('id')
                            .eq('phone', phone)
                            .maybeSingle();

                        if (phoneCheckError) throw phoneCheckError;

                        if (phoneUser) {
                            this.errors.phone = true;
                            this.message = this.tx('err_exists');
                            this.loading = false;
                            return;
                        }

                        // ── ANONYMOUS AUTH CHANNEL SIGNAL GENERATION ──
                        // Completely bypasses SMTP/SMS providers while yielding a matching, valid UUID row sequence parameters
                        const { data: authData, error: signupError } = await window.supabase.auth.signInAnonymously();

                        if (signupError) throw signupError;

                        // Synchronize identical row references securely using the official auth identity UUID
                        if (authData && authData.user) {
                            const { error: profileError } = await window.supabase
                                .from('profiles')
                                .insert([{
                                    id: authData.user.id, // Legitimate structure UUID matching PostgreSQL foreign rules safely
                                    full_name: this.form.name.trim(),
                                    username: this.form.user.trim(),
                                    phone: phone,
                                    preferred_lang: this.lang,
                                    password_hash: this.form.pass 
                                }]);

                            if (profileError) throw profileError;
                        } else {
                            throw new Error('Could not establish authentication reference. Verify dashboard provider rules.');
                        }

                        localStorage.setItem('local_user_logged', 'true');
                        localStorage.setItem('local_user_phone', phone);
                        window.location.href = 'index.html';

                    } else {
                        // Verify table matches against custom dashboard state rows during profile sign-in
                        const { data: userProfile, error: loginError } = await window.supabase
                            .from('profiles')
                            .select('*')
                            .eq('phone', phone)
                            .eq('password_hash', this.form.pass)
                            .maybeSingle();

                        if (loginError || !userProfile) {
                            this.errors.pass = true;
                            this.message = this.tx('err_login');
                            this.loading = false;
                            return;
                        }

                        localStorage.setItem('local_user_logged', 'true');
                        localStorage.setItem('local_user_phone', phone);
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    this.message = err.message;
                } finally {
                    this.loading = false;
                }
            }
        }
    }
</script>

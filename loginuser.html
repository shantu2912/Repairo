<!DOCTYPE html>
<html lang="en" class="scroll-smooth" style="top: 0px !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FixZenix · We fix you Relax</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,600&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-olive': '#5D5646',
                        'brand-gold': '#A07D54',
                        'brand-cream': '#F8F5F0',
                        'brand-dark': '#2D2B28',
                        'brand-beige': '#DFD4C3'
                    },
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', '"Noto Sans Devanagari"', 'sans-serif'], 
                        serif: ['"Playfair Display"', 'serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #F8F5F0; font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; }

        .fixzen-input {
            width: 100%; padding: 1rem 1.25rem; border-radius: 1.2rem;
            border: 2px solid #DFD4C3; background: white;
            font-size: 0.875rem; font-weight: 600; outline: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif;
        }
        .fixzen-input:focus { border-color: #A07D54; box-shadow: 0 0 0 4px rgba(160, 125, 84, 0.1); }
        .fixzen-input.error { border-color: #EF4444; background-color: #FEF2F2; }
        .fixzen-input.success { border-color: #10B981; }
        
        .input-label {
            display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; color: #A07D54; margin-bottom: 0.5rem; margin-left: 0.5rem;
        }
        .btn-primary {
            width: 100%; padding: 1.1rem; border-radius: 1.2rem; background-color: #5D5646;
            color: white; font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.15em; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4a4537; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(93,86,70,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .loader {
            border: 2px solid #f3f3f3; border-top: 2px solid #A07D54;
            border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .lang-btn {
            flex: 1; padding: 0.75rem 0.5rem; border-radius: 1rem;
            border: 2px solid #DFD4C3; background: white;
            font-weight: 700; font-size: 0.8rem; transition: all 0.25s ease;
            cursor: pointer; text-align: center; color: #5D5646;
            font-family: 'Noto Sans Devanagari', 'Plus Jakarta Sans', sans-serif;
        }
        .lang-btn:hover { border-color: #A07D54; background: rgba(160,125,84,0.05); }
        .lang-btn.active { border-color: #5D5646; background: #5D5646; color: white; }
        .deva { font-family: 'Noto Sans Devanagari', sans-serif; }

        /* attempt indicator */
        .attempt-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin: 0 2px; transition: all 0.2s;
        }
        .attempt-dot.active { background-color: #5D5646; }
        .attempt-dot.used { background-color: #EF4444; }
        .attempt-dot.empty { background-color: #DFD4C3; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans" x-data="authApp()">

<div class="w-full max-w-md animate__animated animate__fadeIn px-4">

    <div class="text-center mb-8">
        <img src="fixzen.png" alt="FixZen" class="w-20 h-20 rounded-full mx-auto mb-4 shadow-xl border-2 border-white object-cover">
        <h1 class="text-3xl font-extrabold tracking-[0.2em] text-brand-olive uppercase">FixZen</h1>
        <p class="text-[10px] font-bold text-brand-gold/60 uppercase tracking-[0.3em] mt-1 deva" x-text="tx('tagline')"></p>
    </div>

    <div class="bg-white/90 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-2xl border border-white">

        <!-- ========== LANGUAGE SELECT ========== -->
        <div x-show="step==='lang'" class="space-y-6 text-center">
            <div class="w-12 h-12 bg-brand-cream rounded-full flex items-center justify-center mx-auto mb-2">
                <i class="fa-solid fa-language text-brand-gold text-xl"></i>
            </div>
            <h2 class="font-serif italic text-2xl text-brand-olive deva" x-text="tx('choose_lang')"></h2>
            <p class="text-[10px] text-brand-dark/40 font-bold uppercase tracking-widest">Select / चुनें / निवडा</p>

            <div class="flex gap-3 mt-4">
                <button @click="setLang('en')" :class="lang==='en' ? 'active' : ''" class="lang-btn">
                    <span class="lang-native">🇬🇧 Eng</span>
                    <span class="lang-sub">English</span>
                </button>
                <button @click="setLang('hi')" :class="lang==='hi' ? 'active' : ''" class="lang-btn">
                    <span class="lang-native deva">हिंदी</span>
                    <span class="lang-sub">Hindi</span>
                </button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'active' : ''" class="lang-btn">
                    <span class="lang-native deva">मराठी</span>
                    <span class="lang-sub">Marathi</span>
                </button>
            </div>

            <button @click="proceedFromLang()" class="btn-primary mt-2">
                <i class="fa-solid fa-arrow-right"></i>
                <span class="deva" x-text="tx('lang_continue')"></span>
            </button>
        </div>

        <!-- ========== CHOOSE ========== -->
        <div x-show="step==='choose'" x-cloak class="space-y-4 text-center">
            <div class="flex justify-center gap-2 mb-4">
                <button @click="setLang('en')" :class="lang==='en' ? 'bg-brand-olive text-white' : 'text-brand-olive/50'" class="text-[10px] font-bold px-3 py-1 rounded-full border border-brand-beige transition-all">EN</button>
                <button @click="setLang('hi')" :class="lang==='hi' ? 'bg-brand-olive text-white' : 'text-brand-olive/50'" class="text-[10px] font-bold px-3 py-1 rounded-full border border-brand-beige transition-all deva">हि</button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'bg-brand-olive text-white' : 'text-brand-olive/50'" class="text-[10px] font-bold px-3 py-1 rounded-full border border-brand-beige transition-all deva">म</button>
            </div>

            <h2 class="font-serif italic text-2xl text-brand-olive mb-6 deva" x-text="tx('welcome')"></h2>
            <button @click="isNewUser=true; step='auth'; resetErrors(); resetAttempts()" class="btn-primary deva" x-text="tx('create_account')"></button>
            <button @click="isNewUser=false; step='auth'; resetErrors(); resetAttempts()" class="btn-primary mt-3 !bg-brand-gold deva" x-text="tx('login')"></button>
        </div>

        <!-- ========== AUTH (LOGIN / REGISTER) ========== -->
        <div x-show="step==='auth'" x-cloak>
            <div class="flex justify-end gap-2 mb-4">
                <button @click="setLang('en')" :class="lang==='en' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all">EN</button>
                <button @click="setLang('hi')" :class="lang==='hi' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all deva">हि</button>
                <button @click="setLang('mr')" :class="lang==='mr' ? 'bg-brand-olive text-white' : 'text-brand-olive/40'" class="text-[10px] font-bold px-2 py-0.5 rounded-full border border-brand-beige transition-all deva">म</button>
            </div>

            <h2 class="font-serif italic text-2xl text-brand-olive text-center mb-6 deva" x-text="isNewUser ? tx('create_account') : tx('welcome_back')"></h2>

            <!-- attempt indicator (only for login) -->
            <div x-show="!isNewUser" class="flex justify-center items-center gap-1 mb-4">
                <template x-for="i in 5" :key="i">
                    <span class="attempt-dot" 
                          :class="i <= loginAttempts ? 'used' : (i === loginAttempts + 1 ? 'active' : 'empty')"
                          x-text="''"></span>
                </template>
                <span class="text-[10px] font-bold text-brand-dark/40 ml-2 deva">
                    <span x-text="5 - loginAttempts"></span> <span x-text="tx('attempts_left')"></span>
                </span>
            </div>

            <div class="space-y-4">
                <!-- NAME (only for register) -->
                <div x-show="isNewUser" class="space-y-4" x-collapse>
                    <div>
                        <label class="input-label deva" x-text="tx('full_name')"></label>
                        <input type="text" x-model="form.name" x-on:input="validateField('name')" class="fixzen-input deva" :class="{'error': errors.name, 'success': form.name.trim().length >= 3 && !errors.name}" :placeholder="tx('name_placeholder')">
                        <p x-show="errors.name" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('msg_name_req')"></p>
                    </div>
                    
                    <div>
                        <label class="input-label deva" x-text="tx('username')"></label>
                        <input type="text" x-model="form.user" x-on:input="validateField('user')" class="fixzen-input" :class="{'error': errors.user, 'success': form.user.trim().length > 0 && !errors.user}" :placeholder="tx('user_placeholder')">
                        <p x-show="errors.user" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_user_format')"></p>
                    </div>

                    <div>
                        <label class="input-label deva" x-text="tx('secret_question')"></label>
                        <input type="text" x-model="form.birthplace" class="fixzen-input deva" :placeholder="tx('secret_placeholder')">
                    </div>
                </div>

                <!-- PHONE -->
                <div>
                    <label class="input-label deva" x-text="tx('mobile')"></label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-gold font-bold text-sm select-none">+91</span>
                        <input type="tel" x-model="form.phone" x-on:input="validateField('phone')" maxlength="10" class="fixzen-input pl-14" :class="{'error': errors.phone, 'success': form.phone.trim().length === 10 && !errors.phone}" :placeholder="tx('phone_placeholder')">
                    </div>
                    <p x-show="errors.phone" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_phone')"></p>
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="input-label deva" x-text="tx('password')"></label>
                    <input type="password" x-model="form.pass" x-on:input="validateField('pass')" class="fixzen-input" :class="{'error': errors.pass, 'success': form.pass.length >= 6 && !errors.pass}" :placeholder="tx('pass_placeholder')">
                    <p x-show="errors.pass" class="text-[11px] text-red-500 font-bold mt-1 pl-2 animate__animated animate__headShake" x-text="tx('err_pass')"></p>
                </div>

                <!-- FORGOT PASSWORD link (login only) -->
                <div x-show="!isNewUser" class="text-right pr-1">
                    <button type="button" @click="step='forgot'; message=''; resetErrors()" class="text-xs font-bold text-brand-gold hover:underline underline-offset-2 tracking-wide deva" x-text="tx('forgot_link')"></button>
                </div>

                <!-- SUBMIT -->
                <button @click="processForm()" class="btn-primary mt-6 shadow-lg deva" :disabled="loading || (isNewUser ? false : loginAttempts >= 5)">
                    <span x-show="!loading" x-text="isNewUser ? tx('create_account') : tx('sign_in')"></span>
                    <div x-show="loading" class="loader"></div>
                </button>

                <!-- LOCKED MESSAGE -->
                <div x-show="!isNewUser && loginAttempts >= 5" class="p-3 bg-red-100 border border-red-300 rounded-xl mt-4">
                    <p class="text-xs text-red-700 font-bold text-center deva" x-text="tx('locked_msg')"></p>
                </div>

                <!-- ERROR MESSAGE -->
                <div x-show="message" class="p-3 bg-red-50 border border-red-200 rounded-xl mt-4 animate__animated animate__shakeX">
                    <p class="text-xs text-red-600 font-bold text-center leading-normal deva" x-text="message"></p>
                </div>

                <div class="mt-6 pt-6 border-t border-brand-beige/30 text-center">
                    <button @click="isNewUser = !isNewUser; resetErrors(); resetAttempts(); message=''" class="text-xs font-bold text-brand-gold hover:underline tracking-widest decoration-brand-gold/30 underline-offset-4 deva">
                        <span x-text="isNewUser ? tx('already_member') : tx('new_user')"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ========== FORGOT PASSWORD ========== -->
        <div x-show="step==='forgot'" x-cloak class="space-y-4 animate__animated animate__fadeIn">
            <h2 class="font-serif italic text-2xl text-brand-olive text-center mb-1 deva" x-text="tx('reset_title')"></h2>
            <p class="text-center text-xs text-gray-500 leading-normal mb-4 deva" x-text="tx('reset_subtitle')"></p>

            <div x-show="!forgotVerified" class="space-y-4">
                <div>
                    <label class="input-label deva" x-text="tx('mobile')"></label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-gold font-bold text-sm select-none">+91</span>
                        <input type="tel" x-model="forgot.phone" maxlength="10" class="fixzen-input pl-14" :placeholder="tx('phone_placeholder')">
                    </div>
                </div>

                <div>
                    <label class="input-label deva" x-text="tx('secret_question')"></label>
                    <input type="text" x-model="forgot.birthplace" class="fixzen-input deva" :placeholder="tx('answer_placeholder')">
                </div>

                <button @click="verifyRecoveryDetails()" class="btn-primary mt-2 shadow-md deva" :disabled="loading">
                    <span x-show="!loading" x-text="tx('verify_btn')"></span>
                    <div x-show="loading" class="loader"></div>
                </button>
            </div>

            <div x-show="forgotVerified" class="space-y-4" x-transition>
                <div class="p-3 bg-green-50 border border-green-200 rounded-xl text-center">
                    <p class="text-xs text-green-700 font-bold deva"><i class="fa-solid fa-circle-check mr-1"></i> Identity Verified! Enter your new password below.</p>
                </div>
                <div>
                    <label class="input-label deva" x-text="tx('new_password')"></label>
                    <input type="password" x-model="forgot.newPass" class="fixzen-input" :placeholder="tx('pass_placeholder')">
                </div>

                <button @click="saveNewPassword()" class="btn-primary mt-2 shadow-md bg-brand-gold text-white deva" :disabled="loading">
                    <span x-show="!loading" x-text="tx('save_pass_btn')"></span>
                    <div x-show="loading" class="loader"></div>
                </button>
            </div>

            <div class="mt-6 pt-4 border-t border-brand-beige/30 text-center">
                <button @click="step='auth'; forgotVerified=false; forgot={phone:'',birthplace:'',newPass:''}; message=''; resetAttempts()" class="text-xs font-bold text-brand-dark/50 hover:text-brand-dark tracking-wide deva">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Sign In
                </button>
            </div>
        </div>

    </div>

    <p class="text-center text-[10px] text-brand-olive/30 font-bold mt-6 uppercase tracking-widest">
        FixZen © 2026
    </p>
</div>

                    mobile: 'मोबाइल क्रमांक',
                    phone_placeholder: '9876543210',
                    password: 'पासवर्ड (किमान ६ अक्षरे)',
                    pass_placeholder: '••••••••',
                    sign_in: 'साइन इन करा',
                    already_member: 'आधीच सदस्य आहात? साइन इन करा',
                    new_user: 'नवीन वापरकर्ता? खाते तयार करा',
                    forgot_link: 'पासवर्ड विसरलात?',
                    reset_title: 'पासवर्ड रीसेट करा',
                    reset_subtitle: 'सत्यापनासाठी तुमचा मोबाइल आणि जन्मस्थान प्रविष्ट करा.',
                    verify_btn: 'ओळख सत्यापित करा',
                    new_password: 'नवीन पासवर्ड',
                    save_pass_btn: 'पासवर्ड जतन करा',
                    attempts_left: 'प्रयास शिल्लक',
                    locked_msg: '🔒 खाते लॉक झाले. खूप अपयशी प्रयत्न. समर्थनाशी संपर्क साधा.',
                    msg_name_req: 'नाव आवश्यक आहे (किमान ३ अक्षरे)',
                    err_user_format: 'वापरकर्तानाव आवश्यक आहे',
                    err_phone: '१० अंकी वैध क्रमांक प्रविष्ट करा',
                    err_pass: 'पासवर्ड किमान ६ अक्षरांचा असावा',
                    err_login_fail: 'अवैध क्रेडेन्शियल्स. कृपया पुन्हा प्रयत्न करा.',
                    err_register_fail: 'नोंदणी अयशस्वी. पुन्हा प्रयत्न करा.',
                    err_unknown: 'काहीतरी चूक झाली.',
                }
            },

            // ---------- HELPERS ----------
            tx(key) {
                return this.translations[this.lang]?.[key] || this.translations.en[key] || key;
            },
            setLang(l) {
                this.lang = l;
            },
            proceedFromLang() {
                this.step = 'choose';
            },
            resetErrors() {
                this.errors = { name: false, user: false, phone: false, pass: false };
                this.message = '';
            },
            resetAttempts() {
                this.loginAttempts = 0;
            },
            validateField(field) {
                if (field === 'name') {
                    this.errors.name = this.form.name.trim().length < 3 && this.form.name.length > 0;
                } else if (field === 'user') {
                    this.errors.user = this.form.user.trim().length === 0;
                } else if (field === 'phone') {
                    const p = this.form.phone.trim();
                    this.errors.phone = !/^[0-9]{10}$/.test(p) && p.length > 0;
                } else if (field === 'pass') {
                    this.errors.pass = this.form.pass.length < 6 && this.form.pass.length > 0;
                }
            },

            // ---------- MAIN FORM PROCESS ----------
            async processForm() {
                // prevent if locked
                if (!this.isNewUser && this.loginAttempts >= 5) {
                    this.message = this.tx('locked_msg');
                    return;
                }

                // Validate required fields
                this.errors = { name: false, user: false, phone: false, pass: false };
                let valid = true;
                if (this.isNewUser) {
                    if (this.form.name.trim().length < 3) { this.errors.name = true; valid = false; }
                    if (this.form.user.trim().length === 0) { this.errors.user = true; valid = false; }
                }
                const phone = this.form.phone.trim();
                if (!/^[0-9]{10}$/.test(phone)) { this.errors.phone = true; valid = false; }
                if (this.form.pass.length < 6) { this.errors.pass = true; valid = false; }

                if (!valid) {
                    this.message = 'Please fix the errors above.';
                    return;
                }

                this.loading = true;
                this.message = '';

                try {
                    const sb = window.supabase;
                    if (!sb) throw new Error('Supabase not loaded');

                    if (this.isNewUser) {
                        // ---------- REGISTER ----------
                        const { data, error } = await sb
                            .from('users')
                            .insert([{
                                name: this.form.name.trim(),
                                username: this.form.user.trim(),
                                birthplace: this.form.birthplace.trim(),
                                phone: phone,
                                password: this.form.pass
                            }])
                            .select();

                        if (error) {
                            if (error.code === '23505') this.message = 'Username or phone already exists.';
                            else this.message = this.tx('err_register_fail') + ' ' + error.message;
                        } else {
                            this.message = '✅ Account created! Please sign in.';
                            this.isNewUser = false;
                            this.form = { name: '', user: '', birthplace: '', phone: '', pass: '' };
                            this.resetErrors();
                            this.resetAttempts();
                        }
                    } else {
                        // ---------- LOGIN (with attempt limit) ----------
                        const { data, error } = await sb
                            .from('users')
                            .select('phone, password')
                            .eq('phone', phone)
                            .eq('password', this.form.pass)
                            .maybeSingle();

                        if (error || !data) {
                            this.loginAttempts += 1;
                            const left = 5 - this.loginAttempts;
                            if (this.loginAttempts >= 5) {
                                this.message = this.tx('locked_msg');
                            } else {
                                this.message = this.tx('err_login_fail') + ` (${left} ${this.tx('attempts_left')})`;
                            }
                        } else {
                            // success
                            this.message = '✅ Login successful! Redirecting...';
                            this.resetAttempts();
                            // in real app, redirect or set session
                        }
                    }
                } catch (e) {
                    this.message = this.tx('err_unknown') + ' ' + e.message;
                } finally {
                    this.loading = false;
                }
            },

            // ---------- FORGOT PASSWORD ----------
            async verifyRecoveryDetails() {
                const phone = this.forgot.phone.trim();
                const birthplace = this.forgot.birthplace.trim();
                if (!phone || !birthplace) {
                    this.message = 'Please enter both mobile and birthplace.';
                    return;
                }
                this.loading = true;
                this.message = '';
                try {
                    const sb = window.supabase;
                    const { data, error } = await sb
                        .from('users')
                        .select('phone')
                        .eq('phone', phone)
                        .eq('birthplace', birthplace)
                        .maybeSingle();

                    if (error || !data) {
                        this.message = '❌ No matching account found.';
                    } else {
                        this.forgotVerified = true;
                        this.message = '✅ Verified! Set new password.';
                    }
                } catch (e) {
                    this.message = 'Error: ' + e.message;
                } finally {
                    this.loading = false;
                }
            },

            async saveNewPassword() {
                const newPass = this.forgot.newPass.trim();
                if (newPass.length < 6) {
                    this.message = 'Password must be at least 6 characters.';
                    return;
                }
                this.loading = true;
                this.message = '';
                try {
                    const sb = window.supabase;
                    const { error } = await sb
                        .from('users')
                        .update({ password: newPass })
                        .eq('phone', this.forgot.phone.trim());

                    if (error) throw error;
                    this.message = '✅ Password updated! Please sign in.';
                    this.forgotVerified = false;
                    this.forgot = { phone: '', birthplace: '', newPass: '' };
                    this.step = 'auth';
                    this.resetAttempts();
                } catch (e) {
                    this.message = 'Update failed: ' + e.message;
                } finally {
                    this.loading = false;
                }
            }
        }));
    });
</script>

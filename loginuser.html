        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-google {

            border: 1px solid #E5E7EB; color: #374151; font-weight: 700; font-size: 0.875rem;

            width: 100%; text-align: center; letter-spacing: 0.5em; font-size: 1.5rem;
            border: 2px dashed #A07D54; background: rgba(160, 125, 84, 0.05);
        }
        
        .loader {
            border: 2px solid #f3f3f3; border-top: 2px solid white;
            border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .deva { font-family: 'Noto Sans Devanagari', sans-serif; }

<body class="min-h-screen flex items-center justify-center font-sans bg-gray-50"
x-data="{
  view: 'login', // Default to login (Welcome Back)
  authMethod: 'phone', // Default to phone access
  step: 'form', // 'form' or 'otp'
  loading: false,
  message: '',
  form: { name: '', phone: '', otp: '' },

  // --- VALIDATION HELPERS ---
  validatePhone(phone) {
    const re = /^\d{10}$/; // Matches exactly 10 digits
    return re.test(String(phone).trim());
  },

  normalizePhone(phoneStr) {
    return '+91' + phoneStr.trim();
  },

  // --- GOOGLE OAUTH LOGIN/SIGNUP ---
  async loginWithGoogle() {
    this.loading = true;
    this.message = '';
    try {
      const { data, error } = await window.supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) throw error;
    } catch (err) {
      this.message = err.message;
      this.loading = false;
    }
  },

  // --- MOBILE OTP LOGIN FLOW (No Password) ---
  async sendLoginOtp() {
    this.message = '';
    
    if (!this.validatePhone(this.form.phone)) {
      this.message = 'ENTER VALID 10-DIGIT PHONE NUMBER';
      return;
    }

    this.loading = true;
    try {
      const phone = this.normalizePhone(this.form.phone);

      // 1. Check if user already exists
      const { data: existingUser, error } = await window.supabase
        .from('profiles')
        .select('id')
        .eq('phone', phone)
        .maybeSingle();

      if (error) throw error;
      if (!existingUser) {
        this.message = 'ACCOUNT NOT FOUND. PLEASE CREATE AN ACCOUNT.';
        this.loading = false;
        return;
      }

      // 2. Send OTP
      const { error: otpError } = await window.supabase.auth.signInWithOtp({ phone });
      if (otpError) throw otpError;

      this.step = 'otp';
    } catch (err) {
      this.message = err.message;
    } finally {
      this.loading = false;
    }
  },

  // --- MOBILE OTP SIGNUP FLOW (No Password) ---
  async sendSignupOtp() {
    this.message = '';
    
    if (!this.form.name.trim()) {
        this.message = 'PLEASE ENTER YOUR FULL NAME';
        return;
    }
    
    if (!this.validatePhone(this.form.phone)) {
      this.message = 'ENTER VALID 10-DIGIT PHONE NUMBER';
      return;
    }

    this.loading = true;
    try {
      const phone = this.normalizePhone(this.form.phone);

      // 1. Check if user already exists
      const { data: existingUser, error } = await window.supabase
        .from('profiles')
        .select('id')
        .eq('phone', phone)
        .maybeSingle();

      if (error) throw error;
      if (existingUser) {
        this.message = 'ACCOUNT ALREADY EXISTS. PLEASE SIGN IN.';
        this.loading = false;
        return;
      }

      // 2. Send OTP
      const { error: otpError } = await window.supabase.auth.signInWithOtp({ phone });
      if (otpError) throw otpError;

      this.step = 'otp';
    } catch (err) {
      this.message = err.message;
    } finally {
      this.loading = false;
    }
  },

  // --- VERIFY OTP (Handles both Login and Signup) ---
  async verifyOtp() {
    if (!this.form.otp || this.form.otp.length !== 6) {
      this.message = 'ENTER VALID 6-DIGIT OTP';
      return;
    }

    this.loading = true;
    this.message = '';
    try {
      const phone = this.normalizePhone(this.form.phone);

      const { data, error } = await window.supabase.auth.verifyOtp({
        phone, token: this.form.otp, type: 'sms'
      });
      if (error) throw error;

      const user = data.user;
      if (!user) throw new Error('USER NOT FOUND');

      // If they are in the Signup flow, we must insert their Profile Name into the database
      if (this.view === 'signup') {
          const { error: profileError } = await window.supabase.from('profiles').insert({
            id: user.id, full_name: this.form.name, phone
          });
          if (profileError) throw profileError;
      }

      window.location.href = 'index.html';
    } catch (err) {
      this.message = err.message;
    } finally {
      this.loading = false;
    }
  }
}"
>

<div class="w-full max-w-md animate__animated animate__fadeIn px-4 py-8">

    <div class="absolute top-4 right-4 z-50">
        <div id="google_translate_element"></div>
    </div>

                </button>
                <button @click="authMethod = 'phone'; message=''" 
                        :class="authMethod === 'phone' ? 'bg-brand-gold text-white shadow-md' : 'text-gray-500 hover:text-gray-700'" 
                        class="flex-1 py-3 text-[11px] font-extrabold uppercase tracking-wider rounded-lg transition-all duration-300 deva"
                        x-text="view === 'login' ? 'PHONE ACCESS' : 'PHONE SIGNUP'">
                </button>
            </div>

            <template x-if="authMethod === 'google'">
                <div class="animate__animated animate__fadeIn">
                    <button @click="loginWithGoogle()" class="btn-google deva" :disabled="loading">

                        <span x-text="loading ? 'Connecting...' : 'Continue with Google'"></span>
                        <div x-show="loading" class="loader border-t-gray-500 border-gray-200 ml-2"></div>
                    </button>
                </div>
            </template>

            <template x-if="authMethod === 'phone'">
                <div class="space-y-5 animate__animated animate__fadeIn">
                    
                    <template x-if="view === 'signup'">
                        <div class="space-y-5">
                            <div>
                                <label class="input-label deva">Full Name</label>
                                <input type="text" x-model="form.name" class="fixzen-input deva" placeholder="John Doe">
                            </div>
                            <div>
                                <label class="input-label deva">Phone Number</label>
                                <div class="flex">
                                    <div class="bg-gray-200 border border-r-0 border-gray-200 rounded-l-xl px-4 flex items-center justify-center text-gray-500 font-bold text-sm">+91</div>
                                    <input type="tel" x-model="form.phone" maxlength="10" class="fixzen-input !rounded-l-none !border-l-0" placeholder="9823060308">
                                </div>
                            </div>
                            <button @click="sendSignupOtp()" class="btn-primary mt-2 shadow-lg deva" :disabled="loading">
                                <span x-text="loading ? 'Sending OTP...' : 'Send OTP'"></span>
                                <div x-show="loading" class="loader"></div>
                            </button>
                        </div>
                    </template>

                    <template x-if="view === 'login'">
                        <div class="space-y-5">
                            <div>
                                <label class="input-label deva">Phone Number</label>
                                <div class="flex">
                                    <div class="bg-gray-200 border border-r-0 border-gray-200 rounded-l-xl px-4 flex items-center justify-center text-gray-500 font-bold text-sm">+91</div>
                                    <input type="tel" x-model="form.phone" maxlength="10" class="fixzen-input !rounded-l-none !border-l-0" placeholder="9823060308">
                                </div>
                            </div>
                            <button @click="sendLoginOtp()" class="btn-primary mt-2 shadow-lg deva" :disabled="loading">
                                <span x-text="loading ? 'Requesting...' : 'Get OTP'"></span>
                                <div x-show="loading" class="loader"></div>
                            </button>
                        </div>
                    </template>

                </div>
            </template>

            <p x-show="message" x-text="message" class="text-[10px] text-red-500 font-bold text-center tracking-widest mt-5 deva"></p>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <button @click="view = (view === 'login' ? 'signup' : 'login'); message=''" class="text-[11px] font-bold text-gray-500 uppercase tracking-widest deva group outline-none">
                    <span x-text="view === 'login' ? 'NEW HERE?' : 'ALREADY REGISTERED?'"></span>
                    <span class="text-brand-gold group-hover:underline ml-1" x-text="view === 'login' ? 'CREATE ACCOUNT' : 'SIGN IN'"></span>
                </button>
            </div>
        </div>

        <div x-show="step === 'otp'" x-cloak class="text-center animate__animated animate__fadeIn">
            <div class="w-16 h-16 bg-brand-cream rounded-full flex items-center justify-center text-brand-gold mx-auto mb-6">
                <i class="fa-solid fa-mobile-screen-button text-2xl"></i>
            </div>
            <h2 class="font-serif italic text-2xl text-brand-dark mb-2 deva">Verify Mobile</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-8 deva">
                <span>Code sent to +91</span> <span x-text="form.phone"></span>
            </p>

            <div class="space-y-6">
                <input type="text" x-model="form.otp" maxlength="6" class="fixzen-input otp-box" placeholder="000000">
                <button @click="verifyOtp()" class="btn-primary deva" :disabled="loading">
                    <span x-text="loading ? 'Verifying...' : 'Verify & Continue'"></span>
                    <div x-show="loading" class="loader"></div>
                </button>
                <p x-show="message" x-text="message" class="text-[10px] text-red-500 font-bold text-center tracking-widest mt-2 deva"></p>
                <button @click="step='form'; message=''" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-brand-gold deva outline-none">
                    Change Number
                </button>
            </div>
        </div>

    </div>
    
    <p class="text-center text-[10px] text-gray-400 font-bold mt-6 uppercase tracking-widest">
        FixZen © 2026

</div>

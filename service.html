    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #EEEAE2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #A07D54;
            border-radius: 10px;
        }
        .service-card-hover {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #A07D54 0%, #5D5646 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>

    <script>

        }

        const servicesDB = {

        const SUPABASE_URL = 'https://kzxdxnxgouthsywbsnvl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag';

</head>

<body class="bg-brand-cream text-brand-dark antialiased" x-data="bookingApp()" x-init="init()">

    <!-- Header -->
    <div class="fixed top-0 w-full z-50 p-5 flex justify-between items-center pointer-events-none">
        <a href="index.html" class="pointer-events-auto w-12 h-12 rounded-full glass-header shadow-glass flex items-center justify-center text-brand-olive hover:scale-110 transition-all border border-white/50">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </a>
        <div class="pointer-events-auto glass-header rounded-full px-4 py-2 shadow-glass border border-white/50">
            <span class="text-[10px] font-bold text-brand-gold uppercase tracking-wider">Multi-Service</span>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="h-screen flex flex-col items-center justify-center bg-brand-cream fixed inset-0 z-50">
        <div class="relative">
            <div class="w-20 h-20 rounded-full border-4 border-brand-beige border-t-brand-gold animate-spin"></div>
            <i class="fa-solid fa-tools absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-brand-gold text-xl"></i>
        </div>
        <p class="text-xs font-bold tracking-widest text-brand-olive uppercase mt-4">Loading Services...</p>
    </div>

    <!-- Main Content -->
    <div x-show="!loading" class="pb-48">
        
        <!-- Hero -->
        <div class="relative h-[40vh] w-full rounded-b-[40px] overflow-hidden shadow-2xl bg-gray-900">
            <img :src="service?.image" class="w-full h-full object-cover opacity-90">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>
            <div class="absolute bottom-8 left-6 right-6 text-white">
                <h1 class="text-3xl font-serif font-bold" x-text="service?.name"></h1>
                <p class="text-white/80 text-xs mt-2" x-text="service?.desc"></p>
            </div>
        </div>

        <div class="px-5 mt-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h3 class="font-bold text-lg text-brand-olive flex items-center gap-2">
                        <i class="fas fa-list-check text-brand-gold"></i> Select Services
                    </h3>
                    <p class="text-[10px] text-brand-dark/40">Tap to add multiple services</p>
                </div>
            </div>
            
            <!-- Service List -->
            <div class="space-y-3">
                <template x-for="sub in service?.subs" :key="sub.n">
                    <div @click="toggleSub(sub)" 
                         class="service-card-hover flex justify-between items-center p-4 bg-white rounded-2xl border transition-all cursor-pointer shadow-sm"
                         :class="isSelected(sub) ? 'border-brand-gold bg-orange-50 ring-2 ring-brand-gold/20' : 'border-transparent hover:border-brand-beige'">
                        <div class="flex items-start gap-4">
                            <div class="mt-1 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all"
                                 :class="isSelected(sub) ? 'border-brand-gold bg-brand-gold text-white' : 'border-brand-olive/30'">
                                <i class="fa-solid fa-check text-[10px]" x-show="isSelected(sub)"></i>
                            </div>
                            <div>
                                <p class="font-bold text-brand-dark text-sm" x-text="sub.n"></p>
                                <p class="text-[10px] text-brand-dark/50" x-text="sub.d"></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-bold text-brand-olive text-sm">₹<span x-text="sub.p"></span></span>
                            <p x-show="sub.is_inspection" class="text-[8px] text-brand-gold">Adjusted</p>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Other Issue Description -->
            <div x-show="hasOtherIssue" x-transition class="mt-4 bg-amber-50 border border-brand-gold/30 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-pen-to-square text-brand-gold"></i>
                    <p class="font-bold text-brand-olive text-sm">Describe Your Issue</p>
                </div>
                <textarea x-model="otherIssueText" 
                          placeholder="e.g., Water leaking under sink since yesterday..."
                          rows="3"
                          class="w-full bg-white border border-brand-gold/30 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-gold/40"></textarea>
                <div class="text-[10px] text-brand-gold/80 mt-2">
                    <i class="fa-solid fa-circle-info"></i> ₹299 inspection fee — adjusted if work approved
                </div>
            </div>

            <!-- Bill Breakdown -->
            <div x-show="selectedSubs.length > 0" x-transition class="mt-4 bg-white border border-brand-beige rounded-2xl p-4">
                <p class="font-bold text-brand-olive text-xs uppercase mb-3"><i class="fas fa-receipt text-brand-gold"></i> Your Selection</p>
                <div class="space-y-2 max-h-48 overflow-y-auto">
                    <template x-for="item in selectedSubs" :key="item.n">
                        <div class="flex justify-between items-center py-2 border-b border-gray-100">
                            <div>
                                <p class="text-sm font-semibold" x-text="item.n"></p>
                                <p class="text-[10px] text-brand-dark/40" x-text="item.is_inspection ? 'Inspection fee' : item.d"></p>
                            </div>
                            <span class="text-sm font-bold text-brand-olive">₹<span x-text="item.p"></span></span>
                        </div>
                    </template>
                </div>
                <div class="flex justify-between items-center pt-3 mt-2 border-t-2 border-brand-gold/20">
                    <p class="font-bold">Total Estimate</p>
                    <p class="font-bold text-brand-gold text-xl">₹<span x-text="total"></span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div x-show="!loading" class="fixed bottom-0 w-full z-40 glass-card rounded-t-[30px] border-t border-white/50 p-5">
        <div class="flex justify-between items-center mb-3">
            <div>
                <p class="text-[9px] text-brand-dark/50 uppercase">Total</p>
                <h2 class="text-2xl font-bold text-brand-olive">₹<span x-text="total"></span></h2>
            </div>
            <button @click="openAgreement()" 
                    :disabled="selectedSubs.length === 0"
                    class="px-6 py-3 rounded-xl font-bold"
                    :class="selectedSubs.length > 0 ? 'bg-brand-olive text-white' : 'bg-gray-200 text-gray-400 cursor-not-allowed'">
                Book Now
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div x-show="showAgreement" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 p-4" x-cloak style="display: none;">
        <div class="bg-white w-full max-w-md rounded-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <h3 class="text-xl font-bold gradient-text mb-4">Confirm Booking</h3>
                
                <div class="space-y-3">
                    <input type="text" x-model="customerName" placeholder="Full Name" class="w-full p-3 border rounded-xl">
                    <input type="tel" x-model="phone" placeholder="Phone Number" class="w-full p-3 border rounded-xl">
                    <input type="text" x-model="address" placeholder="Address" class="w-full p-3 border rounded-xl">
                    <input type="date" x-model="date" :min="minDate" class="w-full p-3 border rounded-xl">
                    <input type="time" x-model="time" class="w-full p-3 border rounded-xl">
                </div>

                <label class="flex items-center gap-2 mt-4">
                    <input type="checkbox" x-model="agreed" class="w-4 h-4">
                    <span class="text-xs">I agree to the terms & conditions</span>
                </label>

                <div class="flex gap-3 mt-6">
                    <button @click="showAgreement = false" class="flex-1 py-3 border rounded-xl">Cancel</button>
                    <button @click="confirmBooking()" :disabled="!agreed || bookingLoading" class="flex-1 py-3 bg-brand-olive text-white rounded-xl">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bookingApp() {
            return {
                service: null,
                selectedSubs: [],
                showAgreement: false,
                agreed: false,
                loading: true,
                bookingLoading: false,
                user: null,
                customerName: '',
                phone: '',
                address: '',
                date: '',
                time: '',
                minDate: '',
                otherIssueText: '',

                get hasOtherIssue() {
                    return this.selectedSubs.some(s => s.is_inspection === true);
                },

                get total() {
                    return this.selectedSubs.reduce((sum, item) => sum + item.p, 0);
                },

                isSelected(sub) {
                    return this.selectedSubs.some(s => s.n === sub.n);
                },

                async init() {
                    const params = new URLSearchParams(window.location.search);
                    let id = params.get('id');
                    if (!id) { window.location.href = 'index.html'; return; }
                    
                    this.service = servicesDB[id.toLowerCase()] || servicesDB['default'];
                    
                    const today = new Date();
                    this.minDate = today.toISOString().split('T')[0];
                    this.date = this.minDate;
                    this.time = '10:00';
                    
                    const storedPhone = localStorage.getItem('local_user_phone');
                    if (storedPhone && window.sb) {
                        const { data: profile } = await window.sb.from('profiles').select('*').eq('phone', storedPhone).maybeSingle();
                        if (profile) {
                            this.user = profile;
                            this.customerName = profile.full_name;
                            this.phone = profile.phone?.replace('+91', '');
                            this.address = profile.address || '';
                        }
                    }
                    
                    this.loading = false;
                },

                toggleSub(sub) {
                    const index = this.selectedSubs.findIndex(s => s.n === sub.n);
                    if (index > -1) {
                        this.selectedSubs.splice(index, 1);
                    } else {
                        this.selectedSubs.push(sub);
                    }
                },

                openAgreement() {
                    if (this.selectedSubs.length === 0) return;
                    if (!this.user) {
                        alert('Please login to book');
                        window.location.href = 'loginuser.html';
                        return;
                    }
                    this.showAgreement = true;
                },

                async confirmBooking() {
                    if (this.bookingLoading) return;
                    
                    if (!this.agreed) { alert('Accept terms'); return; }
                    if (!this.customerName) { alert('Enter name'); return; }
                    if (!this.phone) { alert('Enter phone'); return; }
                    if (!this.address) { alert('Enter address'); return; }
                    
                    this.bookingLoading = true;
                    
                    const hasOtherIssue = this.hasOtherIssue;
                    const serviceNames = this.selectedSubs.map(s => s.n).join(', ');
                    const priceBreakdown = {};
                    this.selectedSubs.forEach(s => { priceBreakdown[s.n] = s.p; });
                    
                    const jobPayload = {
                        user_id: this.user.id,
                        category: this.service.name,
                        services_selected: serviceNames,
                        service_price_breakdown: JSON.stringify(priceBreakdown),
                        customer_name: this.customerName,
                        location: this.address,
                        phone: '+91' + this.phone,
                        status: 'pending',
                        scheduled_time: `${this.date}T${this.time}:00`,
                        original_price: this.total,
                        discounted_price: this.total,
                        is_inspection_job: hasOtherIssue,
                        inspection_fee_amount: hasOtherIssue ? 299 : 0,
                        other_issue: hasOtherIssue ? this.otherIssueText : ''
                    };
                    
                    const { data, error } = await window.sb.from('jobs').insert([jobPayload]).select().single();
                    
                    if (error) {
                        alert('Error: ' + error.message);
                        this.bookingLoading = false;
                        return;
                    }
                    
                    localStorage.setItem('active_job_id', data.id);
                    window.location.href = 'success.html?job_id=' + data.id;
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</body>
</html>

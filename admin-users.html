<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FixZen Admin | Customers</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: system-ui;
background: linear-gradient(135deg,#f7f4ef,#f1eee9);
}

.card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

</style>

</head>

<body class="text-[#403a31]">

<!-- HEADER -->

<div class="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row md:justify-between gap-4">

<div>

<h1 class="text-3xl font-black flex items-center gap-3">

<i class="fa-solid fa-users text-[#b48c5c]"></i>

FixZen Admin

</h1>

<p class="text-sm text-gray-500 mt-1">
Customer Management Dashboard
</p>

</div>

<div class="relative w-full md:w-80">

<i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>

<input
id="searchInput"
placeholder="Search customer or phone..."
class="w-full pl-9 pr-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-[#b48c5c]"
oninput="filterUsers()"
/>

</div>

</div>


<!-- STATS -->

<div class="max-w-7xl mx-auto px-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-5 mb-6">

<div class="card p-5 flex justify-between items-center">

<div>
<p class="text-xs text-gray-500 font-bold">TOTAL CUSTOMERS</p>
<h2 id="totalUsers" class="text-3xl font-black mt-1">0</h2>
</div>

<i class="fa-solid fa-user text-2xl text-[#b48c5c]"></i>

</div>

<div class="card p-5 flex justify-between items-center">

<div>
<p class="text-xs text-gray-500 font-bold">TOTAL BOOKINGS</p>
<h2 id="totalBookings" class="text-3xl font-black mt-1">0</h2>
</div>

<i class="fa-solid fa-clipboard-list text-2xl text-green-500"></i>

</div>

</div>


<!-- TABLE -->

<div class="max-w-7xl mx-auto px-6">

<div class="card overflow-x-auto">

<table class="w-full min-w-[750px]">

<thead class="bg-gray-50 text-xs text-gray-500">

<tr>

<th class="p-4 text-left">CUSTOMER</th>

<th class="p-4 text-center">PHONE</th>

<th class="p-4 text-center">TOTAL JOBS</th>

<th class="p-4 text-center">LAST BOOKING</th>

<th class="p-4 text-center">ACTION</th>

</tr>

</thead>

<tbody id="userTable">

<tr>
<td colspan="5" class="p-10 text-center text-gray-400">
Loading customers...
</td>
</tr>

</tbody>

</table>

</div>

</div>


<script>

const sb = supabase.createClient(
"https://kzxdxnxgouthsywbsnvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag"
        );

let allUsers = [];


/* LOAD USERS */

async function loadUsers(){

const { data, error } = await sb
.from("jobs")
.select("customer_name, phone, created_at");

if(error){

alert(error.message);

return;

}

const userMap = {};

data.forEach(j=>{

const key = (j.customer_name || "Unknown") + "_" + (j.phone || "NA");

if(!userMap[key]){

userMap[key] = {
name: j.customer_name || "Unknown",
phone: j.phone || "-",
count: 0,
last: j.created_at
};

}

userMap[key].count++;

if(new Date(j.created_at) > new Date(userMap[key].last)){
userMap[key].last = j.created_at;
}

});

allUsers = Object.values(userMap);

document.getElementById("totalUsers").innerText = allUsers.length;
document.getElementById("totalBookings").innerText = data.length;

renderUsers(allUsers);

}



function renderUsers(users){

const table = document.getElementById("userTable");

table.innerHTML = "";

if(users.length === 0){

table.innerHTML = `
<tr>
<td colspan="5" class="p-10 text-center text-gray-400 font-bold">
No customers found
</td>
</tr>
`;

return;

}

users.forEach(u=>{

table.innerHTML += `

<tr class="border-t hover:bg-gray-50 transition">

<td class="p-4 flex items-center gap-3">

<div class="w-10 h-10 rounded-full bg-[#b48c5c] text-white flex items-center justify-center font-bold">

${u.name.charAt(0)}

</div>

<div>

<p class="font-bold">${u.name}</p>

</div>

</td>

<td class="p-4 text-center font-medium">

${u.phone}

</td>

<td class="p-4 text-center font-black">

${u.count}

</td>

<td class="p-4 text-center text-sm text-gray-500">

${new Date(u.last).toLocaleDateString()}

</td>

<td class="p-4 text-center">

<button
onclick="viewHistory('${u.phone}')"
class="px-4 py-2 rounded-lg bg-[#b48c5c] text-white text-xs font-bold hover:bg-[#9d774c]">

VIEW HISTORY

</button>

</td>

</tr>

`;

});

}



function filterUsers(){

const q = document.getElementById("searchInput").value.toLowerCase();

const filtered = allUsers.filter(u =>
u.name.toLowerCase().includes(q) ||
u.phone.toLowerCase().includes(q)
);

renderUsers(filtered);

}



function viewHistory(phone){

window.location.href =
"user-history.html?phone=" + encodeURIComponent(phone);

}


loadUsers();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Review & Rating</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Customer Feedback</h2>
        <p class="text-sm text-slate-500 mb-6">We value your review! Please let us know how we did.</p>

        <form id="reviewForm" class="space-y-5">
            <!-- Customer Name -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Customer Name</label>
                <input type="text" id="customerName" required 
                    class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                    placeholder="John Doe">
            </div>

            <!-- Service Booked -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Service Booked</label>
                <input type="text" id="serviceBooked" required 
                    class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                    placeholder="e.g., Home Cleaning, AC Repair">
            </div>

            <!-- Past Services Count -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Number of Past Services Booked</label>
                <input type="number" id="pastServices" min="0" required 
                    class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                    placeholder="0">
            </div>

            <!-- Service Rating (1-5) -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Service Rating (1 - 5 Stars)</label>
                <select id="serviceRating" required 
                    class="w-full px-4 py-2 rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <option value="" disabled selected>Select a rating</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
                    <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
                    <option value="3">⭐⭐⭐ 3 - Good</option>
                    <option value="2">⭐⭐ 2 - Fair</option>
                    <option value="1">⭐ 1 - Poor</option>
                </select>
            </div>

            <!-- Review Description -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Review Description</label>
                <textarea id="reviewDescription" rows="4" required 
                    class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none" 
                    placeholder="Share your experience with us..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition duration-200 flex justify-center items-center">
                Submit Review
            </button>
        </form>

        <!-- Status Message -->
        <p id="statusMessage" class="mt-4 text-center text-sm font-medium hidden"></p>
    </div>

    <script>
        // 1. Initialize Supabase
       // 1. Initialize Supabase correctly
// 1. Initialize Supabase with a unique variable name
const SUPABASE_URL = 'https://kzxdxnxgouthsywbsnvl.supabase.co'; 
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag';

// CHANGED: Variable renamed to 'supabaseClient' to prevent conflicts
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('reviewForm');
const statusMessage = document.getElementById('statusMessage');
const submitBtn = document.getElementById('submitBtn');

// 2. Form Submission Event
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const customerName = document.getElementById('customerName').value;
    const serviceBooked = document.getElementById('serviceBooked').value;
    const pastServices = parseInt(document.getElementById('pastServices').value, 10);
    const serviceRating = parseInt(document.getElementById('serviceRating').value, 10);
    const reviewDescription = document.getElementById('reviewDescription').value;

    try {
        // CHANGED: Using 'supabaseClient' here to talk to your database
        const { data, error } = await supabaseClient
            .from('reviews')
            .insert([
                { 
                    customer_name: customerName, 
                    service_booked: serviceBooked, 
                    past_services_count: pastServices, 
                    service_rating: serviceRating, 
                    review_description: reviewDescription 
                }
            ]);

        if (error) throw error;

        statusMessage.textContent = "Thank you! Your review has been submitted.";
        statusMessage.className = "mt-4 text-center text-sm font-medium text-green-600 block";
        form.reset();

    } catch (error) {
        console.error("Error submitting review:", error);
        statusMessage.textContent = "Something went wrong. Please try again.";
        statusMessage.className = "mt-4 text-center text-sm font-medium text-red-600 block";
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Review";
    }
});
    </script>
</body>
</html>

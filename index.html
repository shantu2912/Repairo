         // PERSISTED LOCAL STORAGE IDENTITY CHECK SNAPSHOT
         async checkUser() {
             const checkLogged = localStorage.getItem('local_user_logged');
             const userPhone = localStorage.getItem('local_user_phone');

             if (checkLogged === 'true' && userPhone && window.sb) {
                 try {
                     // Query custom profiles table directly to extract display fields
                     const { data: profile, error } = await window.sb
                         .from('profiles')
                         .select('*')
                         .eq('phone', userPhone.trim())
                         .maybeSingle();

                     if (error) throw error;

                     if (profile) {
                         this.user = profile;
                         await this.checkActiveJobsFromDatabase(profile.id);
                     } else {
                         // Fallback identity context instantiation if profile reference yields empty
                         this.user = { full_name: 'Valued Customer', phone: userPhone };
                     }
                 } catch (err) {
                     console.error('Error parsing profile indices: ', err.message);
                     this.user = { full_name: 'Valued Customer', phone: userPhone };
                 }
             } else {
                 this.user = null;
             }
         },

         async checkActiveJobsFromDatabase(userId) {
             try {
                 const { data: activeJobs, error } = await window.sb
                     .from('jobs')
                     .select('id, status')
                     .eq('user_id', userId)
                     .in('status', ['pending', 'accepted', 'searching', 'assigned', 'arrived', 'started'])
                     .order('created_at', { ascending: false });

                 if (error) throw error;

                 if (activeJobs && activeJobs.length > 0) {
                     this.currentActiveJobId = activeJobs[0].id;
                     this.currentJobStatus = activeJobs[0].status;
                     localStorage.setItem('active_job_id', this.currentActiveJobId);
                 } else {
                     this.currentActiveJobId = null;
                     this.currentJobStatus = '';
                     localStorage.removeItem('active_job_id');

             } catch (err) {
                 this.currentActiveJobId = localStorage.getItem('active_job_id');

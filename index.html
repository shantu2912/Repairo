<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FixZenix - Premium Home Services</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- TRANSLATOR SCRIPT (Universal Language Switcher handles the top buttons automatically) -->
    <script src="translator.js"></script>
    
    <style>
        /* Hide scrollbar for horizontal scrolling categories */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="appData()" class="bg-[#EEEAE2] text-[#5D5646] font-sans overflow-x-hidden pb-24">

    <!-- LOADING SCREEN (4 Seconds) -->
    <div x-show="loading" 
         class="fixed inset-0 z-[100] bg-[#EEEAE2] flex flex-col items-center justify-center transition-opacity duration-500"
         x-transition:leave="transition ease-in duration-500"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <h1 class="text-4xl font-serif italic text-[#5D5646] tracking-wider mb-4 animate-pulse">FixZenix</h1>
        <div class="w-12 h-12 border-4 border-[#A07D54]/30 border-t-[#5D5646] rounded-full animate-spin"></div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div x-show="!loading" style="display: none;" 
         x-transition:enter="transition ease-out duration-1000" 
         x-transition:enter-start="opacity-0" 
         x-transition:enter-end="opacity-100">
        
        <!-- HEADER -->
        <header class="bg-white sticky top-0 z-50 px-4 py-3 shadow-sm flex justify-between items-center h-[70px]">
            <!-- Hamburger Menu -->
            <button class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-600 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            
            <!-- Logo -->
            <div class="flex items-center gap-1">
                <h1 class="text-2xl font-serif italic font-bold text-[#5D5646]">FixZenix</h1>
                <span class="text-[8px] font-bold bg-[#EEEAE2] text-[#A07D54] px-1.5 py-0.5 rounded uppercase tracking-wider">Premium</span>
            </div>
            
            <!-- Booking Icon -->
            <button class="w-10 h-10 bg-[#A07D54] text-white rounded-full flex items-center justify-center shadow-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            </button>
        </header>

        <!-- HERO SECTION -->
        <div class="px-4 mt-2 relative">
            <div class="relative w-full h-[350px] rounded-3xl overflow-hidden shadow-lg">
                <!-- Using your provided image verbatim -->
                <img src="image_a595d5.jpg" alt="Painting Service" class="absolute inset-0 w-full h-full object-cover">
                <!-- Dark Gradient Overlay for text readability -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
                
                <div class="absolute bottom-14 left-5 right-5 text-white">
                    <span class="bg-[#A07D54] text-white text-[10px] font-bold px-3 py-1 rounded-full mb-3 inline-block uppercase tracking-wide">LIMITED DEAL</span>
                    <h2 class="text-3xl font-bold leading-tight mb-4">Fresh Walls, Fresh Feel – from ₹299</h2>
                    <a href="service.html" class="bg-white text-black text-sm font-bold px-5 py-2.5 rounded-full inline-flex items-center gap-2 hover:bg-gray-100 transition shadow-md">
                        Get Painter 
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>
                </div>
            </div>
            
            <!-- FLOATING SEARCH BAR -->
            <div class="absolute -bottom-6 left-0 right-0 px-8 z-10">
                <div class="bg-white rounded-2xl shadow-xl p-2 flex items-center gap-3 border border-gray-100">
                    <div class="w-12 h-12 bg-[#8C7A6B] rounded-xl flex items-center justify-center text-white shrink-0 shadow-inner">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" placeholder="खोजें डीप क्लीनिंग" class="w-full bg-transparent border-none focus:ring-0 text-sm font-medium text-[#5D5646] placeholder-gray-400 outline-none">
                </div>
            </div>
        </div>

        <!-- HOT OFFERS TICKER -->
        <div class="px-4 mt-12 mb-6">
            <div class="bg-[#5D5646] rounded-xl overflow-hidden flex items-center shadow-md relative">
                <div class="bg-[#A07D54] text-white text-[10px] font-bold px-3 py-2.5 flex items-center gap-1.5 z-10 shrink-0 tracking-wide">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"></path></svg>
                    HOT OFFERS
                </div>
                <div class="overflow-hidden whitespace-nowrap py-2.5 w-full">
                    <div class="animate-[marquee_15s_linear_infinite] inline-block text-white text-xs font-medium">
                        <span class="mx-4">Welcome to Fixzenix!</span>
                        <span class="text-[#A07D54]">✦</span>
                        <span class="mx-4">summer sale 20% off on painting!</span>
                    </div>
                </div>
                <!-- Pause Button on Ticker -->
                <div class="bg-[#5D5646] px-3 z-10 shrink-0 text-gray-300">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </div>
            </div>
        </div>

        <!-- CATEGORIES SECTION -->
        <div class="mt-8">
            <div class="px-4 flex items-center gap-2 mb-4">
                <div class="w-1 h-6 bg-[#A07D54] rounded-full"></div>
                <h3 class="text-xl font-bold text-[#5D5646]">निर्माण और घर</h3>
            </div>
            
            <div class="flex overflow-x-auto gap-4 px-4 pb-4 no-scrollbar">
                <!-- Carpenter -->
                <a href="service.html" class="block w-[130px] shrink-0 bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="https://images.unsplash.com/photo-1581141849291-1125c7b692b5?w=400&q=80" alt="Carpenter" class="w-full h-[110px] object-cover">
                    <div class="p-2.5 text-center">
                        <h4 class="font-bold text-xs text-gray-800">बढ़ई</h4>
                    </div>
                </a>
                
                <!-- Plumber -->
                <a href="service.html" class="block w-[130px] shrink-0 bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="https://images.unsplash.com/photo-1585704032915-c3400ca199e7?w=400&q=80" alt="Plumber" class="w-full h-[110px] object-cover">
                    <div class="p-2.5 text-center">
                        <h4 class="font-bold text-xs text-gray-800">प्लंबर</h4>
                    </div>
                </a>
                
                <!-- Electrician -->
                <a href="service.html" class="block w-[130px] shrink-0 bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?w=400&q=80" alt="Electrician" class="w-full h-[110px] object-cover">
                    <div class="p-2.5 text-center">
                        <h4 class="font-bold text-xs text-gray-800">इलेक्ट्रीशियन</h4>
                    </div>
                </a>
            </div>
        </div>
        
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-[30px] z-50">
        <div class="flex justify-around items-center p-2.5">
            <a href="index.html" class="flex flex-col items-center justify-center w-24 h-14 bg-[#5D5646] rounded-[20px] text-white shadow-md transition-all">
                <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold">होम</span>
            </a>
            
            <a href="bookings.html" class="flex flex-col items-center justify-center w-24 h-14 text-gray-400 hover:text-[#5D5646] transition-all">
                <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-medium">Bookings</span>
            </a>
            
            <a href="profile.html" class="flex flex-col items-center justify-center w-24 h-14 text-gray-400 hover:text-[#5D5646] transition-all">
                <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </div>
    </nav>

    <!-- LOGIC SCRIPTS -->
    <script>
        // Alpine Logic for the 4-second delay Loading Screen
        function appData() {
            return {
                loading: true,
                init() {
                    // Syncs with the translator.js button appearance
                    setTimeout(() => {
                        this.loading = false;
                    }, 4000); 
                }
            }
        }
        
        // Tailwind config setup for the marquee scrolling animation
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(-100%)' }
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>

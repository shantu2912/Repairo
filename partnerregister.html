<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixZen - Join as Expert</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #B58B5B; border-radius: 10px; }

        /* Animated Mesh Background */
        .mesh-bg {
            background-color: #F3F0EA;
            background-image: 
                radial-gradient(at 80% 0%, hsla(38, 38%, 53%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(43, 14%, 36%, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(38, 38%, 53%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(0, 0%, 100%, 0.8) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism Card */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(106, 98, 81, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }

        /* Premium Input Wrappers */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #E5E1DA;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .input-wrapper:focus-within {
            border-color: #B58B5B;
            box-shadow: 0 0 0 4px rgba(181, 139, 91, 0.1);
            transform: translateY(-2px);
            background: #FFFFFF;
        }

        .input-wrapper:focus-within i { color: #B58B5B; transform: scale(1.1); }

        .premium-input { 
            width: 100%; 
            background: transparent;
            padding: 1.1rem 1rem 1.1rem 0; 
            outline: none; 
            color: #2D2C2B;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .premium-input::placeholder { color: #A9A39B; font-weight: 400; }
        .input-icon { padding: 0 1rem; color: #A9A39B; transition: all 0.3s ease; }

        /* Shimmering Button */
        .btn-shimmer { 
            position: relative;
            width: 100%; 
            padding: 1.25rem; 
            background: linear-gradient(135deg, #2D2C2B 0%, #4A4537 100%); 
            color: #FFFFFF; 
            border-radius: 16px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 30px -10px rgba(45, 44, 43, 0.4);
            overflow: hidden;
        }
        
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite;
        }

        .btn-shimmer:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -10px rgba(45, 44, 43, 0.5);
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2C2B 100%);
        }
        .btn-shimmer:active { transform: scale(0.98); }
        .btn-shimmer:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Select Arrow Override */
        select.premium-input { appearance: none; padding-right: 2.5rem; cursor: pointer; }
        .select-wrapper::after {
            content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            font-size: 0.8rem; color: #B58B5B; position: absolute; right: 1.2rem; top: 50%; 
            transform: translateY(-50%); pointer-events: none; transition: transform 0.3s ease;
        }
        .select-wrapper:focus-within::after { transform: translateY(-50%) rotate(180deg); }

        /* Animations */
        @keyframes shimmer { 100% { left: 200%; } }
        @keyframes slideUpSpring {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            70% { transform: translateY(-5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes floatSlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(5deg); }
        }

        .animate-spring { animation: slideUpSpring 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-stagger-1 { animation: slideUpSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s forwards; opacity: 0; }
        .animate-stagger-2 { animation: slideUpSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards; opacity: 0; }
        .animate-stagger-3 { animation: slideUpSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards; opacity: 0; }
        .animate-stagger-4 { animation: slideUpSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.4s forwards; opacity: 0; }
        .animate-stagger-5 { animation: slideUpSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards; opacity: 0; }
        
        .floating-shape-1 { position: fixed; top: 10%; left: 5%; font-size: 4rem; color: rgba(181, 139, 91, 0.1); animation: floatSlow 8s infinite; pointer-events: none; z-index: 0; }
        .floating-shape-2 { position: fixed; bottom: 10%; right: 5%; font-size: 6rem; color: rgba(106, 98, 81, 0.05); animation: floatSlow 12s infinite reverse; pointer-events: none; z-index: 0; }
    </style>
</head>

<body class="mesh-bg min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden text-[#534E46]">

    <i class="fa-solid fa-wrench floating-shape-1"></i>
    <i class="fa-solid fa-gear floating-shape-2"></i>

    <div class="w-full max-w-md glass-panel p-8 sm:p-10 rounded-[2.5rem] relative z-10 my-8 animate-spring" x-data="{ isSubmitting: false, isSuccess: false }" x-cloak>
        
        <div x-show="!isSuccess" x-transition:leave="transition ease-in duration-300" x-transition:leave-end="opacity-0 scale-95 translate-y-4">
            
            <div class="text-center mb-8 animate-stagger-1">
                <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-5 flex items-center justify-center shadow-[0_10px_20px_rgba(181,139,91,0.2)] border border-[#E5E1DA] transform -rotate-3 transition-transform hover:rotate-0 duration-300">
                    <i class="fa-solid fa-user-astronaut text-3xl text-[#B58B5B]"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-[#2D2C2B] tracking-tight">Expert Partner</h1>
                <p class="text-[#A9A39B] mt-2 text-sm font-medium">Join FixZen and multiply your earnings.</p>
            </div>
            
            <form @submit.prevent="submitTechnician($data)" class="space-y-4">
                
                <div class="animate-stagger-2">
                    <div class="input-wrapper group">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="regName" class="premium-input" placeholder="Full Legal Name" pattern="[A-Za-z ]{3,40}" title="Only letters allowed" required>
                    </div>
                </div>

                <div class="animate-stagger-2">
                    <div class="input-wrapper group">
                        <i class="fa-solid fa-mobile-screen-button input-icon"></i>
                        <span class="text-[#B58B5B] font-bold text-sm mr-2 border-r border-[#E5E1DA] pr-2">+91</span>
                        <input type="tel" id="regPhone" class="premium-input !pl-0" placeholder="9876543210" maxlength="10" pattern="[6-9]{1}[0-9]{9}" required>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 animate-stagger-3">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-at input-icon !pr-2"></i>
                        <input type="text" id="regUsername" class="premium-input !pl-0" placeholder="Username" required>
                    </div>
                    
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon !pr-2"></i>
                        <input type="password" id="regPassword" class="premium-input !pl-0" placeholder="Password" required>
                    </div>
                </div>

                <div class="animate-stagger-4 select-wrapper">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-toolbox input-icon"></i>
                        <select id="regCategory" class="premium-input" required>
                            <option value="" disabled selected>Your Specialization</option>
                            <option value="AC Tech">AC Technician</option>
                            <option value="Fridge">Refrigerator Repair</option>
                            <option value="Washing Machine">Washing Machine</option>
                            <option value="RO filter">Water Purifier (RO)</option>
                            <option value="Carpenter">Carpentry</option>
                            <option value="Plumber">Plumbing</option>
                            <option value="Electrician">Electrical Works</option>
                            <option value="TV/LED">TV & Electronics</option>
                            <option value="Painter">Painting</option>
                            <option value="Pest Ctrl">Pest Control</option>
                            <option value="Clean">Deep Cleaning</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-5 gap-4 animate-stagger-4">
                    <div class="col-span-2 input-wrapper relative">
                        <i class="fa-solid fa-star input-icon !pr-2"></i>
                        <input type="number" id="regExp" class="premium-input !pl-0 !pr-8" placeholder="Exp" min="0" max="50" required>
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[#A9A39B] text-xs font-bold">Yrs</span>
                    </div>
                    <div class="col-span-3 input-wrapper">
                        <i class="fa-regular fa-id-card input-icon !pr-2"></i>
                        <input type="text" id="regAadhaar" class="premium-input !pl-0 tracking-widest font-mono" placeholder="Aadhaar No." maxlength="12" pattern="[0-9]{12}" required>
                    </div>
                </div>

                <div class="animate-stagger-5 pb-2">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-map-location-dot input-icon"></i>
                        <input type="text" id="regArea" class="premium-input" placeholder="City or Locality" pattern="[A-Za-z ]{3,40}" required>
                    </div>
                </div>

                <div class="animate-stagger-5 pt-2">
                    <button type="submit" class="btn-shimmer" :disabled="isSubmitting">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            <span x-text="isSubmitting ? 'Processing...' : 'Submit Application'"></span>
                            <i x-show="!isSubmitting" class="fa-solid fa-arrow-right-long transition-transform group-hover:translate-x-1"></i>
                            <i x-show="isSubmitting" class="fa-solid fa-circle-notch fa-spin"></i>
                        </span>
                    </button>
                </div>
            </form>
        </div>

        <div x-show="isSuccess" x-transition:enter="transition ease-out duration-700 delay-300" x-transition:enter-start="opacity-0 translate-y-10 scale-90" class="text-center py-8">
            <div class="relative w-32 h-32 mx-auto mb-8">
                <div class="absolute inset-0 bg-[#10B981] opacity-20 rounded-full blur-2xl animate-pulse"></div>
                <div class="relative w-full h-full bg-gradient-to-tr from-[#10B981] to-[#34D399] rounded-full flex items-center justify-center shadow-2xl border-4 border-white transform hover:scale-105 transition-transform">
                    <i class="fa-solid fa-check text-5xl text-white"></i>
                </div>
                <i class="fa-solid fa-sparkles absolute top-0 right-0 text-yellow-400 animate-bounce"></i>
                <i class="fa-solid fa-star absolute bottom-4 left-0 text-[#B58B5B] animate-pulse" style="animation-delay: 0.5s;"></i>
            </div>
            
            <h2 class="text-3xl font-extrabold text-[#2D2C2B] tracking-tight mb-2">Welcome Aboard!</h2>
            <p class="text-[#6A6251] mt-3 leading-relaxed text-sm bg-white/50 p-4 rounded-2xl border border-white">
                Your profile is under review.<br>Our onboarding team will call you within <span class="font-extrabold text-[#B58B5B] text-base">24 hours</span> to activate your account.
            </p>
            
            <a href="index.html" class="mt-8 flex items-center justify-center gap-2 w-full py-4 bg-white border-2 border-[#E5E1DA] text-[#2D2C2B] rounded-2xl font-bold hover:border-[#B58B5B] hover:text-[#B58B5B] transition-all group shadow-sm">
                <i class="fa-solid fa-house transition-transform group-hover:-translate-y-1"></i>
                Return to Home
            </a>
        </div>
    </div>

<script>
const supabaseUrl = "https://kzxdxnxgouthsywbsnvl.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag";
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function submitTechnician(state) {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value.trim();
    const category = document.getElementById('regCategory').value;
    const experience = document.getElementById('regExp').value.trim();
    const aadhaar = document.getElementById('regAadhaar').value.trim();
    const area = document.getElementById('regArea').value.trim();

    if (!/^[A-Za-z ]{3,40}$/.test(name)) { alert("Enter valid full name"); return; }
    if (!/^[6-9]\d{9}$/.test(phone)) { alert("Enter valid 10 digit mobile number"); return; }
    if (!/^[a-zA-Z0-9_]{4,20}$/.test(username)) { alert("Username should be 4-20 characters"); return; }
    if (password.length < 6) { alert("Password must be at least 6 characters"); return; }
    if (experience < 0 || experience > 50) { alert("Enter valid experience"); return; }
    if (!/^\d{12}$/.test(aadhaar)) { alert("Aadhaar must be 12 digits"); return; }
    if (!/^[A-Za-z ]{3,40}$/.test(area)) { alert("Enter valid service area"); return; }

    state.isSubmitting = true;

    try {
        const { error } = await _supabase
        .from('technicians')
        .insert([{
            name: name,
            phone: "+91" + phone,
            username: username,
            password: password,
            category: category,
            experience: parseFloat(experience),
            aadhaar: aadhaar,
            area: area,
            status: 'pending'
        }]);

        if (error) throw error;
        state.isSuccess = true;

    } catch (err) {
        alert("Database Error: " + err.message);
    } finally {
        state.isSubmitting = false;
    }
}
</script>
</body>
</html>

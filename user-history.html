<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FixZen Admin | Customer History</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: system-ui;
}
</style>

</head>

<body class="bg-[#f7f4ef] text-[#3f3a31]">

<!-- HEADER -->
<div class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

<div class="flex items-center gap-4">

<button onclick="goBack()"
class="px-4 py-2 bg-black text-white rounded-xl text-sm font-bold hover:bg-gray-800">

← Back

</button>

<h1 class="text-2xl font-black">
Customer Booking History
</h1>

</div>

</div>

</div>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-6 py-8 space-y-6">

<!-- CUSTOMER INFO -->
<div id="customerCard"
class="bg-white rounded-2xl p-6 shadow">

<div class="flex justify-between items-center">

<div>

<p class="text-xs text-gray-500 font-bold">
CUSTOMER PHONE
</p>

<h2 id="customerPhone"
class="text-xl font-black mt-1">
-
</h2>

</div>

<div>

<p class="text-xs text-gray-500 font-bold">
TOTAL BOOKINGS
</p>

<h2 id="bookingCount"
class="text-xl font-black mt-1">
0
</h2>

</div>

</div>

</div>

<!-- HISTORY TABLE -->
<div class="bg-white rounded-2xl shadow overflow-x-auto">

<table class="w-full">

<thead class="bg-gray-50 text-xs text-gray-500">

<tr>

<th class="p-4 text-left">SERVICE</th>

<th class="p-4 text-center">LOCATION</th>

<th class="p-4 text-center">STATUS</th>

<th class="p-4 text-center">PRICE</th>

<th class="p-4 text-center">DATE</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>
<td colspan="5" class="p-10 text-center text-gray-400">
Loading booking history...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script>

const sb = supabase.createClient(
"https://kzxdxnxgouthsywbsnvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag"
        );
function goBack(){

window.location.href = "admin-users.html";

}

function getPhone(){

const params = new URLSearchParams(window.location.search);

return params.get("phone");

}

async function loadHistory(){

const phone = getPhone();

document.getElementById("customerPhone").innerText = phone;

const { data, error } = await sb
.from("jobs")
.select("*")
.eq("phone", phone)
.order("created_at",{ascending:false});

if(error){

alert(error.message);

return;

}

const table = document.getElementById("historyTable");

if(!data || data.length === 0){

table.innerHTML = `
<tr>

<td colspan="5" class="p-10 text-center text-gray-400 font-bold">

No bookings found for this customer

</td>

</tr>
`;

return;

}

document.getElementById("bookingCount").innerText = data.length;

table.innerHTML = "";

data.forEach(job=>{

table.innerHTML += `

<tr class="border-t hover:bg-gray-50">

<td class="p-4 font-semibold">

${job.category || "-"}

</td>

<td class="p-4 text-center">

${job.location || "-"}

</td>

<td class="p-4 text-center">

<span class="px-3 py-1 rounded-lg text-xs font-bold
${job.status==="completed" ? "bg-green-100 text-green-700":
job.status==="cancelled" ? "bg-red-100 text-red-700":
"bg-yellow-100 text-yellow-700"}">

${job.status || "pending"}

</span>

</td>

<td class="p-4 text-center font-bold">

₹${job.price || 0}

</td>

<td class="p-4 text-center text-sm text-gray-600">

${new Date(job.created_at).toLocaleDateString()}

</td>

</tr>

`;

});

}

loadHistory();

</script>

</body>
</html>

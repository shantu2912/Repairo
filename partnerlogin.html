<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FixZen Pro | Partner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F3F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #B58B5B, #9a764d, #B58B5B);
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #B58B5B 0%, #9a764d 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 12px 30px rgba(181, 139, 91, 0.3);
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4A4A4A;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8E2D8;
            border-radius: 14px;
            font-size: 15px;
            color: #1A1A1A;
            background: #FAFAFA;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus {
            border-color: #B58B5B;
            background: white;
            box-shadow: 0 0 0 4px rgba(181, 139, 91, 0.1);
        }

        .form-input::placeholder {
            color: #B0A89E;
        }

        .form-input-icon {
            position: relative;
        }

        .form-input-icon .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #B0A89E;
            font-size: 18px;
        }

        .form-input-icon .form-input {
            padding-left: 48px;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5D5646 0%, #4A4436 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(93, 86, 70, 0.35);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 10px 14px;
            color: #DC2626;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message .icon {
            font-size: 16px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6B6560;
        }

        .register-link a {
            color: #B58B5B;
            text-decoration: none;
            font-weight: 700;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 44px;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B8580;
            font-size: 16px;
            pointer-events: none;
        }

        .forgot-link {
            text-align: right;
            margin-top: 4px;
        }

        .forgot-link a {
            font-size: 12px;
            color: #B0A89E;
            text-decoration: none;
        }

        .forgot-link a:hover {
            color: #B58B5B;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    
    <!-- Logo -->
    <div class="logo-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>

    <h1 class="text-2xl font-extrabold text-center text-[#1A1A1A] mb-2">Welcome Back</h1>
    <p class="text-center text-[#6B6560] text-sm mb-6">Login to your FixZen Pro account</p>

    <!-- Error Message -->
    <div id="error" class="error-message">
        <span class="icon">⚠️</span>
        <span id="errorText">Invalid credentials</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="event.preventDefault(); login();">
        
        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="form-input-icon">
                <span class="icon">👤</span>
                <input 
                    id="username" 
                    type="text" 
                    class="form-input" 
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                />
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="form-input-icon">
                <span class="icon">🔒</span>
                <input 
                    id="password" 
                    type="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                />
            </div>
            <div class="forgot-link">
                <a href="#" onclick="alert('Contact support to reset your password.')">Forgot password?</a>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Language</label>
            <div class="select-wrapper">
                <select id="languageSelect" class="form-input">
                    <option value="en">🇬🇧 English</option>
                    <option value="mr">🇮🇳 मराठी</option>
                    <option value="hi">🇮🇳 हिन्दी</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            <span id="loginText">Login</span>
            <span id="loginSpinner" style="display:none;" class="spinner"></span>
        </button>

    </form>

    <div class="register-link">
        Don't have an account? <a href="partnerregister.html">Register Now</a>
    </div>

</div>

<script src="partnerlogin.js"></script>

</body>
</html>

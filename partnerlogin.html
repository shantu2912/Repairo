<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FixZen Pro | Partner Login</title>
<link href="https://fonts.googleapis.com/css2?
family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<script src="translator.js"></script>

<script src="i18n.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#F8F5F0]">
<div class="bg-white p-10 rounded-3xl shadow-xl w-[360px]">
<h1 class="text-2xl font-bold text-center mb-6">FixZenix</h1>
<input
id="username"
placeholder="Your Username"
class="w-full mb-4 p-3 border rounded-xl"
/>
<input
id="password"
type="password"
placeholder="Your Password"
class="w-full mb-4 p-3 border rounded-xl"
/>
<!-- LANGUAGE SELECT -->
<select

id="languageSelect"
class="w-full mb-4 p-3 border rounded-xl"
>
<option value="en">English</option>
<option value="mr">मराठी</option>
<option value="hi"> हिन्दी</option>
</select>
<p id="error" class="text-red-600 text-sm mb-3 hidden"></p>
<button
onclick="login()"
class="w-full bg-[#5D5646] text-white py-3 rounded-xl font-bold"
>
      LOGIN
</button>
</div>

      <script src="partnerlogin.js"></script>

      


</body>
</html>

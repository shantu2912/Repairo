<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixZen Pro | Technician Dashboard</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<!-- Icons / Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'brand-olive': '#5D5646',
        'brand-gold': '#A07D54',
        'brand-cream': '#F8F5F0',
        'brand-dark': '#2D2B28',
        'brand-beige': '#DFD4C3'
      }
    }
  }
}
</script>
<style>
[x-cloak]{display:none}
body{background:#F8F5F0;color:#2D2B28}
.glass-card{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(18px);
  border:1px solid #fff;
  box-shadow:0 15px 35px rgba(93,86,70,.08)
}
</style>

<!-- ✅ SUPABASE CLIENT -->
<script>
window.sb = supabase.createClient(
  "https://kzxdxnxgouthsywbsnvl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag"
);
</script>
</head>

<body
x-data="dashboardHandler()"
x-init="init()"
x-cloak
class="font-sans antialiased pb-36"
>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-brand-cream/80 backdrop-blur border-b p-5">
  <div class="max-w-md mx-auto flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-full bg-brand-olive text-white flex items-center justify-center font-bold">
        <span x-text="techName.charAt(0)"></span>
      </div>
      <div>
        <p class="text-[10px] uppercase tracking-widest text-brand-gold font-black">Pro Partner</p>
        <p class="font-serif italic text-lg text-brand-olive" x-text="techName"></p>
      </div>
    </div>
    <div class="flex gap-2">
      <span x-show="notificationSupported" class="text-green-600 text-xs bg-green-100 px-2 py-1 rounded-full">
        <i class="fa-solid fa-bell"></i> Live
      </span>
      <button @click="logout()" class="text-brand-olive hover:text-red-500">
        <i class="fa-solid fa-power-off"></i>
      </button>
    </div>
  </div>
</header>

<main class="max-w-md mx-auto p-6 space-y-8">

<!-- STATS -->
<section>
  <div class="grid grid-cols-2 gap-4">
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Active Jobs</p>
      <h3 class="text-3xl font-extrabold text-brand-olive" x-text="stats.activeJobs"></h3>
    </div>
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Earnings</p>
      <h3 class="text-3xl font-extrabold text-green-700">
        ₹<span x-text="stats.earnings"></span>
      </h3>
    </div>
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Today</p>
      <h3 class="text-3xl font-extrabold text-purple-700">
        ₹<span x-text="stats.todayEarnings"></span>
      </h3>
    </div>
    <div class="glass-card p-5 rounded-[2rem] flex items-center justify-center">
      <label class="flex items-center gap-2 text-xs">
        <input 
          type="checkbox" 
          class="accent-green-600 w-5 h-5"
          x-model="available"
          @change="toggleAvailability($event)"
        >
        <span class="font-semibold" :class="available ? 'text-green-600' : 'text-gray-400'">
          <span x-text="available ? 'Available' : 'Unavailable'"></span>
        </span>
      </label>
    </div>
  </div>
</section>

<!-- JOBS -->
<section id="jobsSection" class="space-y-4">

  <div x-show="loading" class="text-center text-sm text-brand-dark/50 mt-20">
    Loading jobs…
  </div>

  <div x-show="!loading && jobs.length === 0"
       class="text-center text-sm text-brand-dark/50 mt-20">
    No active jobs
  </div>

  <template x-for="job in jobs" :key="job.id">
    <div class="glass-card p-6 rounded-[2.5rem] border-l-4"
         :class="job.urgent ? 'border-red-500':'border-brand-gold'">

      <!-- TITLE -->
      <span class="text-[9px] font-bold text-brand-gold uppercase" x-text="job.category"></span>
      <h4 class="text-lg font-extrabold text-brand-olive" x-text="job.device"></h4>
      <p class="text-xs italic text-brand-dark/60" x-text="job.issue"></p>
      <p class="text-xs text-gray-500 mt-1">
        Started: <span x-text="formatTime(job.started_at)"></span>
      </p>

      <!-- FOOTER -->
      <div class="flex justify-between items-center border-t mt-4 pt-4">

        <!-- CUSTOMER -->
        <div>
          <p class="text-sm font-bold" x-text="job.customer_name"></p>
          <a
            :href="'tel:' + job.phone"
            class="text-xs text-green-600 font-bold mt-1 block">
            📞 Call Customer
          </a>

          <p class="text-[9px] uppercase text-brand-dark/40" x-text="job.location"></p>
          <button
            @click="openMaps(job.location)"
            class="text-xs text-blue-600 font-bold mt-1">
            Open in Maps →
          </button>
        </div>

        <!-- STATUS + ACTION -->
        <div class="flex flex-col items-end gap-2">
          <span
            :class=" job.status === 'pending' ? 'bg-gray-100 text-gray-700' :
                     job.status === 'in_progress' ? 'bg-blue-100 text-blue-700' :
                     job.status === 'arrived' ? 'bg-purple-100 text-purple-700' :
                     'bg-green-100 text-green-700'"
            class="px-3 py-1 rounded-full text-[10px] font-black"
            x-text="job.status.replace('_',' ')"
          ></span>
          
          <button
            x-show="job.status === 'pending'"
            @click="acceptJob(job.id)"
            class="px-4 py-2 bg-green-600 text-white text-xs rounded-xl"
          >
            Accept
          </button>

          <button
            x-show="job.status === 'pending'"
            @click="rejectJob(job.id)"
            class="px-4 py-2 bg-red-500 text-white text-xs rounded-xl"
          >
            Reject
          </button>

          <button
            x-show="job.status === 'in_progress'"
            @click="markArrived(job)"
            class="px-4 py-2 bg-blue-600 text-white text-xs rounded-xl"
          >
            Mark Arrived
          </button>

          <button
            x-show="job.status === 'arrived'"
            @click="completeJob(job)"
            class="px-5 py-2 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase"
          >
            Complete Job
          </button>
        </div>
      </div>
    </div>
  </template>

</section>

</main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50">
  <div class="relative bg-white/90 backdrop-blur border rounded-full px-4 py-3 flex justify-between items-center shadow-2xl">
    <button class="w-12 h-12 text-brand-gold">
      <i class="fa-solid fa-house"></i>
    </button>
    <button @click="scrollToJobs()" class="w-12 h-12 text-brand-olive/40 hover:text-brand-gold">
      <i class="fa-solid fa-box-open"></i>
    </button>
    <div class="w-14 h-12"></div>
    <button onclick="window.location.href='completed_jobs.html'"
            class="w-12 h-12 text-brand-olive/40 hover:text-brand-gold">
      <i class="fa-solid fa-book-open"></i>
    </button>
    <button @click="logout()" class="w-12 h-12 text-brand-olive/40">
      <i class="fa-solid fa-circle-user"></i>
    </button>
    <button
      class="absolute left-1/2 -translate-x-1/2 -top-6
             w-14 h-14 bg-brand-gold rounded-full
             flex items-center justify-center text-white
             shadow-lg border-4 border-white"
      onclick="window.location.href='job_detail.html'">
      <i class="fa-solid fa-camera"></i>
    </button>
  </div>
</nav>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCFCS5Epty691ONqtUqcngfV-Fz53j6x_o",
  authDomain: "fixzen-73d68.firebaseapp.com",
  projectId: "fixzen-73d68",
  messagingSenderId: "816193738840",
  appId: "1:816193738840:web:7ba3545e56d3538bf7522d"
};

firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

function dashboardHandler() {
  return {
    tech: null,
    techName: '',
    loading: true,
    jobs: [],
    stats: { activeJobs: 0, earnings: 0, todayEarnings: 0 },
    incomingJob: null,
    available: true,
    notificationSupported: false,

    async init() {
      this.tech = JSON.parse(localStorage.getItem("active_tech"));
      if (!this.tech) {
        window.location.href = "partnerlogin.html";
        return;
      }
      
      this.techName = this.tech.name;
      this.notificationSupported = 'Notification' in window;
      
      // Check for action from notification click
      const urlParams = new URLSearchParams(window.location.search);
      const action = urlParams.get('action');
      const jobId = urlParams.get('job_id');
      
      if (action === 'accept' && jobId) {
        setTimeout(() => this.acceptJob(jobId), 1000);
      }
      
      await this.setupNotifications();
      await this.fetchJobs();
      this.subscribeRealtime();
      
      // Listen for foreground messages
      messaging.onMessage((payload) => {
        console.log("📱 [FOREGROUND] Message received:", payload);
        this.showInAppNotification(payload);
      });
    },

    async setupNotifications() {
      try {
        if (!('serviceWorker' in navigator)) {
          console.error("Service Worker not supported");
          alert("Your browser doesn't support background notifications");
          return;
        }

        // Register service worker with correct scope
        const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js', {
          scope: './'
        });
        
        console.log("✅ Service Worker registered:", registration);
        
        // Wait for service worker to be ready
        await navigator.serviceWorker.ready;
        
        // Check if we already have permission
        if (Notification.permission === 'granted') {
          await this.getAndSaveToken(registration);
        } else if (Notification.permission !== 'denied') {
          // Request permission
          const permission = await Notification.requestPermission();
          if (permission === 'granted') {
            await this.getAndSaveToken(registration);
          } else {
            alert("Please enable notifications to receive job alerts");
          }
        }
      } catch (err) {
        console.error("❌ Notification setup failed:", err);
      }
    },

    async getAndSaveToken(registration) {
      try {
        const currentToken = await messaging.getToken({
          vapidKey: "BBZpS8kGM1KZEP1f0L9TeEM-WHUAKND52kqpPPb-9I1EuWNlXItKHaRGqNkrmOKPzjhvtP3oysjZ8Dq1SuN4yBk",
          serviceWorkerRegistration: registration
        });

        if (currentToken) {
          console.log("✅ FCM Token:", currentToken);
          
          // Save token to database
          const { error } = await window.sb
            .from("technicians")
            .update({ 
              fcm_token: currentToken,
              last_active: new Date().toISOString()
            })
            .eq("id", this.tech.id);

          if (error) {
            console.error("❌ Failed to save token:", error);
          } else {
            console.log("✅ Token saved to database");
          }
        } else {
          console.log("No registration token available");
        }
      } catch (err) {
        console.error("❌ Error getting token:", err);
      }
    },

    showInAppNotification(payload) {
      // Show a small toast/in-app notification
      const notification = document.createElement('div');
      notification.className = 'fixed top-20 left-4 right-4 bg-green-600 text-white p-4 rounded-2xl shadow-2xl z-50 animate__animated animate__slideInDown';
      notification.innerHTML = `
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-bell fa-shake text-xl"></i>
          <div>
            <p class="font-bold">${payload.notification?.title || 'New Job'}</p>
            <p class="text-xs opacity-90">${payload.notification?.body || ''}</p>
          </div>
        </div>
      `;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 5000);
    },

    openMaps(location) {
      const encoded = encodeURIComponent(location);
      window.open(`https://www.google.com/maps/search/?api=1&query=${encoded}`, '_blank');
    },

    toggleAvailability(e) {
      this.available = e.target.checked;
      // Update in database
      window.sb
        .from("technicians")
        .update({ available: this.available })
        .eq("id", this.tech.id)
        .then(({ error }) => {
          if (error) console.error("Failed to update availability:", error);
        });
    },

    async fetchJobs() {
      this.loading = true;
      const { data, error } = await window.sb
        .from("jobs")
        .select("*")
        .or(`and(status.eq.pending,tech_id.is.null),tech_id.eq.${this.tech.id}`)
        .not("rejected_by", "cs", `{${this.tech.id}}`)
        .order("created_at", { ascending: false });

      if (!error) {
        this.jobs = data || [];
        this.updateStats();
      }
      this.loading = false;
    },

    updateStats() {
      this.stats.activeJobs = this.jobs.filter(j => j.status !== 'completed').length;
      
      const completedJobs = this.jobs.filter(
        j => j.status === 'completed' && j.tech_id === this.tech.id
      );

      this.stats.earnings = completedJobs.reduce((total, job) => {
        return total + (job.technician_fee || 0);
      }, 0);

      const today = new Date().toISOString().split('T')[0];
      this.stats.todayEarnings = completedJobs
        .filter(j => j.completed_at?.startsWith(today))
        .reduce((sum, j) => sum + (j.technician_fee || 0), 0);
    },

    subscribeRealtime() {
      window.sb
        .channel(`public-jobs`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "jobs" },
          (payload) => {
            const job = payload.new;
            
            if (job.rejected_by?.includes(this.tech.id)) {
              this.jobs = this.jobs.filter(j => j.id !== job.id);
              return;
            }

            const index = this.jobs.findIndex(j => j.id === job.id);
            if (index !== -1) {
              this.jobs[index] = job;
            } else {
              if (job.status === "pending" && !job.tech_id) {
                this.jobs.unshift(job);
                // Show notification for new pending jobs
                if (document.visibilityState === 'visible') {
                  this.showInAppNotification({
                    notification: {
                      title: '🔧 New Job Available',
                      body: `${job.category} - ${job.location}`
                    }
                  });
                }
              }
            }
            this.updateStats();
          }
        )
        .subscribe();
    },

    async acceptJob(jobId) {
      const { data, error } = await window.sb
        .from("jobs")
        .update({
          tech_id: this.tech.id,
          status: "in_progress",
          started_at: new Date().toISOString()
        })
        .eq("id", jobId)
        .is("tech_id", null)
        .eq("status", "pending")
        .select();

      if (error) {
        console.error("Accept error:", error);
        alert("Database error while accepting job");
        return;
      }

      if (!data || data.length === 0) {
        alert("Too late. Another technician already took this job.");
        return;
      }

      // Update UI
      const index = this.jobs.findIndex(j => j.id === jobId);
      if (index !== -1) {
        this.jobs[index].status = "in_progress";
        this.jobs[index].tech_id = this.tech.id;
      }

      // Store active job
      localStorage.setItem("locked_job_id", jobId);
      
      // Show success message
      alert("Job accepted successfully!");
      
      // Optionally redirect to job detail
      // window.location.href = "job_detail.html";
    },

    async rejectJob(jobId) {
      const job = this.jobs.find(j => j.id === jobId);
      if (!job) return;

      const currentRejected = job.rejected_by || [];

      const { error } = await window.sb
        .from("jobs")
        .update({
          rejected_by: [...currentRejected, this.tech.id]
        })
        .eq("id", jobId);

      if (error) {
        console.error("Reject failed:", error);
        alert("Reject failed");
        return;
      }

      this.jobs = this.jobs.filter(j => j.id !== jobId);
      this.updateStats();
    },

    async markArrived(job) {
      try {
        const { error } = await window.sb
          .from('jobs')
          .update({
            arrived_at: new Date().toISOString(),
            status: 'arrived'
          })
          .eq('id', job.id)
          .eq('tech_id', this.tech.id);

        if (error) {
          console.error("Arrival error:", error);
          alert("Failed to mark arrival: " + error.message);
          return;
        }

        // Update UI
        job.arrived_at = new Date().toISOString();
        job.status = "arrived";
        
        alert("Arrival marked successfully");
      } catch (err) {
        console.error("Arrival error:", err);
        alert("Failed to mark arrival");
      }
    },

    async completeJob(job) {
      const completedAt = new Date().toISOString();
      const fee = this.calculateFee(job);

      const { error } = await window.sb
        .from("jobs")
        .update({
          status: "completed",
          completed_at: completedAt,
          technician_fee: fee
        })
        .eq("id", job.id)
        .eq("tech_id", this.tech.id);

      if (error) {
        console.error(error);
        alert("Failed to complete job: " + error.message);
        return;
      }

      alert("Job marked as completed!");
      this.fetchJobs();
    },

    calculateFee(job) {
      const BASE = {
        "Carpenter": 800,
        "Plumber": 600,
        "Electrician": 600,
        "Painter": 600,
        "Mason": 600,
        "Welder": 600,
        "Roofer": 600,
        "AC Tech": 600
      };
      return BASE[job.category] ?? 400;
    },

    formatTime(dt) {
      if(!dt) return "-";
      const diff = Math.floor((Date.now() - new Date(dt)) / 60000);
      if(diff < 1) return "just now";
      if(diff < 60) return diff + " mins ago";
      const hours = Math.floor(diff / 60);
      if(hours < 24) return hours + " hrs ago";
      const days = Math.floor(hours / 24);
      return days + " days ago";
    },

    scrollToJobs() {
      document.getElementById('jobsSection').scrollIntoView({ behavior: 'smooth' });
    },

    logout() {
      localStorage.removeItem("active_tech");
      localStorage.removeItem("locked_job_id");
      window.location.href = "partnerlogin.html";
    }
  }
}
</script>
</body>
</html>

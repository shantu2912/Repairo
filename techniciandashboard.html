<script>function dashboardHandler(){
return {
  tech: null,
  techName: '',
  loading: true,
  jobs: [],
  stats: { activeJobs: 0, earnings: 0, todayEarnings: 0 },
  incomingJob: null,
  available: true,
  
  // REWARDS STATE
  tokens: 0,
  redeeming: false,

  async init() {
    this.tech = JSON.parse(localStorage.getItem("active_tech"));
    if (!this.tech) {
        window.location.href = "partnerlogin.html";
        return;
    }
    // 🔒 HARD ENFORCEMENT: check locked job
  const lockedJobId = localStorage.getItem("locked_job_id");
  if (lockedJobId) {
    window.location.href = "job_detail.html";
    return;
  }
    this.techName = this.tech.name;
    
    // FETCH TOKENS ON LOAD
    await this.fetchTechnicianData();
    
    await this.setupNotifications();
    
// ADD THIS BLOCK HERE
messaging.onMessage((payload) => {
  console.log("Foreground message:", payload);

  const title = payload.notification?.title || "New Job";
  const body = payload.notification?.body || "You have a new job";

  new Notification(title, {
    body: body,
    icon: "/icon-192.png"
  });
});

    await this.fetchJobs();
    this.subscribeRealtime();

    
  },
  
  openMaps(location){
  const encoded = encodeURIComponent(location);
  window.open(`https://maps.google.com/?q=${encoded}`, '_blank');
},
toggleAvailability(e){
  this.available = e.target.checked;
  console.log("Technician availability:", this.available);
},

// --- REWARDS LOGIC ---
async fetchTechnicianData() {
    try {
        const { data, error } = await window.sb
            .from('technicians')
            .select('tokens')
            .eq('id', this.tech.id)
            .single();
            
        if (data && data.tokens !== undefined) {
            this.tokens = data.tokens;
        }
    } catch (err) {
        console.error("Error fetching tokens:", err);
    }
},

async redeemTokens() {
    if (this.tokens < 500 || this.redeeming) return;
    
    this.redeeming = true;
    
    try {
        // Calculate new token balance
        const newTokens = this.tokens - 500;
        
        // Update database
        const { error } = await window.sb
            .from('technicians')
            .update({ tokens: newTokens })
            .eq('id', this.tech.id);
            
        if (error) throw error;
        
        // Success
        this.tokens = newTokens;
        
        // Add 100 rs to their visual earnings immediately for that "dopamine hit"
        this.stats.earnings += 100;
        this.stats.todayEarnings += 100;
        
        alert("🎉 Congratulations! You have successfully redeemed 500 tokens for ₹100 cash! It has been added to your pending payout.");
        
    } catch (err) {
        alert("Failed to redeem tokens. Please try again.");
        console.error(err);
    } finally {
        this.redeeming = false;
    }
},

// Inside dashboardHandler() init
async setupNotifications() {
  try {
    if (!('serviceWorker' in navigator)) {
      console.error("Service Worker not supported");
      return;
    }

    // ✅ Correct path (same folder as HTML)
    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    console.log("SW Registered:", registration);

    // Ask permission
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      console.error("Notification permission denied");
      return;
    }

    // Get FCM token
    const token = await messaging.getToken({
      vapidKey: "BBZpS8kGM1KZEP1f0L9TeEM-WHUAKND52kqpPPb-9I1EuWNlXItKHaRGqNkrmOKPzjhvtP3oysjZ8Dq1SuN4yBk",
      serviceWorkerRegistration: registration
    });

    if (!token) {
      console.error("No FCM token received");
      return;
    }

    console.log("FCM Token:", token);

    // Save token to DB
    await window.sb
      .from("technicians")
      .update({ fcm_token: token })
      .eq("id", this.tech.id);

    console.log("Token saved to Supabase");

  } catch (err) {
    console.error("Notification setup failed:", err);
  }
},

  async fetchJobs(){
    this.loading = true;
    const { data, error } = await window.sb
      .from("jobs")
      .select("*")
      .or(`and(status.eq.pending,tech_id.is.null),tech_id.eq.${this.tech.id}`)
      .not("rejected_by", "cs", `{${this.tech.id}}`)
      .order("created_at", { ascending: false });

    if (!error) {
  this.jobs = data;

  // Active jobs
  this.stats.activeJobs = data.filter(j => j.status !== 'completed').length;

  // 🔥 REAL EARNINGS CALCULATION
  const completedJobs = data.filter(
    j => j.status === 'completed' && j.tech_id === this.tech.id
  );

  this.stats.earnings = completedJobs.reduce((total, job) => {
    return total + (job.technician_fee || 0);
  }, 0);
  const today = new Date().toISOString().split('T')[0];

this.stats.todayEarnings = data
  .filter(j =>
    j.status === 'completed' &&
    j.tech_id === this.tech.id &&
    j.completed_at?.startsWith(today)
  )
  .reduce((sum, j) => sum + (j.technician_fee || 0), 0);

}

    this.loading = false;
  },
subscribeRealtime() {
  window.sb
    .channel(`public-jobs`)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "jobs" }, // listen to INSERT + UPDATE
      (payload) => {
        const job = payload.new;

        // Remove rejected jobs
        if (job.rejected_by?.includes(this.tech.id)) {
          this.jobs = this.jobs.filter(j => j.id !== job.id);
          return;
        }

        // Update job if exists
        const index = this.jobs.findIndex(j => j.id === job.id);
        if (index !== -1) {
          this.jobs[index] = job;
        } else {
          // Add new pending jobs
          if (job.status === "pending" && !job.tech_id) {
            this.jobs.unshift(job);
          }
        }

        this.stats.activeJobs = this.jobs.filter(j => j.status !== 'completed').length;
        // Recalculate earnings live
        const completedJobs = this.jobs.filter(
          j => j.status === 'completed' && j.tech_id === this.tech.id
        );

        this.stats.earnings = completedJobs.reduce((total, job) => {
          return total + (job.technician_fee || 0);
        }, 0);

      }
      
    )
    .subscribe();
},

  /* ✅ ACCEPT JOB */
 async acceptJob(jobId) {
  // Strict atomic update: only accept if truly free
  const { data, error } = await window.sb
    .from("jobs")
    .update({
      tech_id: this.tech.id,
      status: "in_progress",
      started_at: new Date().toISOString()
    })
    .eq("id", jobId)
    .is("tech_id", null)        // must be unassigned
    .eq("status", "pending")    // must be pending
    .select();

  if (error) {
    console.error("Accept error:", error);
    alert("Database error while accepting job");
    return;
  }

  if (!data || data.length === 0) {
    alert("Too late. Another technician already took this job.");
    return;
  }

  // Immediate UI update
const index = this.jobs.findIndex(j => j.id === jobId);
if (index !== -1) {
  this.jobs[index].status = "in_progress";
  this.jobs[index].tech_id = this.tech.id;
}

// 🔒 HARD LOCK: store active job and force redirect
localStorage.setItem("locked_job_id", jobId);
window.location.href = "job_detail.html";
},

  /* ❌ REJECT JOB */
  async rejectJob(jobId) {
  const job = this.jobs.find(j => j.id === jobId);
  if (!job) return;

  const currentRejected = job.rejected_by || [];

  const { error } = await window.sb
    .from("jobs")
    .update({
      rejected_by: [...currentRejected, this.tech.id]
    })
    .eq("id", jobId);

  if (error) {
    console.error("Reject failed:", error);
    alert("Reject failed");
    return;
  }

  // Remove instantly from UI (no refresh)
  this.jobs = this.jobs.filter(j => j.id !== jobId);
  this.stats.activeJobs = this.jobs.filter(j => j.status !== 'completed').length;
},

  /* ✅ COMPLETE JOB (UPDATED TO ADD TOKENS) */
async completeJob(job) {
  const completedAt = new Date().toISOString();
  const fee = this.calculateFee(job); // Uses your predefined fee logic

  // 1. Mark job as completed
  const { error: jobError } = await window.sb
    .from("jobs")
    .update({
      status: "completed",
      completed_at: completedAt,
      technician_fee: fee
    })
    .eq("id", job.id)
    .eq("tech_id", this.tech.id); 

  if (jobError) {
    console.error(jobError);
    alert("Failed to complete job: " + jobError.message);
    return;
  }
  
  // 2. Add 50 Tokens to the technician's profile
  try {
      const newTokens = this.tokens + 50;
      await window.sb
        .from('technicians')
        .update({ tokens: newTokens })
        .eq('id', this.tech.id);
        
      this.tokens = newTokens; // Update UI immediately
  } catch(tokenErr) {
      console.error("Job completed, but failed to add tokens:", tokenErr);
  }
  
  alert("✅ Job completed! You earned 50 Tokens!");
  
  // Remove hard lock
  localStorage.removeItem("locked_job_id");
  this.fetchJobs(); // Refresh the list
},

async markArrived(job){
  try {
    console.log("Marking arrival for job:", job.id);

    const { data, error } = await window.sb   // 🔥 FIXED HERE
      .from('jobs')
      .update({
        arrived_at: new Date().toISOString()
      })
      .eq('id', job.id)
      .eq('tech_id', this.tech.id); // extra safety

    if (error) {
      console.error("SUPABASE ERROR:", error);
      alert("DB Error: " + error.message);
      return;
    }

    // Update UI instantly (no refresh)
    job.arrived_at = new Date().toISOString();
    job.status = "arrived"; // UI-only state (NOT saved to DB)

    alert("Arrival marked successfully");

  } catch (err) 
  {
    console.error("ARRIVAL FULL ERROR:", err);
    alert("Failed to mark arrival: " + (err.message || "Unknown error"));
  }
},


formatTime(dt){
  if(!dt) return "-";

  const diff = Math.floor((Date.now() - new Date(dt)) / 60000);

  if(diff < 1) return "just now";
  if(diff < 60) return diff + " mins ago";

  const hours = Math.floor(diff / 60);
  if(hours < 24) return hours + " hrs ago";

  const days = Math.floor(hours / 24);
  return days + " days ago";
},

  calculateFee(job){
    const BASE = {
      "Carpenter": 800,
      "Plumber": 600,
      "Electrician": 600,
      "Painter": 600,
      "Mason": 600,
      "Welder": 600,
      "Roofer": 600,
      "AC Tech": 600

    };
    return BASE[job.category] ?? 400;
  },

async acceptIncoming() {
  const job = this.incomingJob;
  if (!job) return;

  const { data, error } = await window.sb
    .from("jobs")
    .update({
      tech_id: this.tech.id,
      status: "in_progress",
      started_at: new Date().toISOString()
    })
    .eq("id", job.id)
    .eq("status", "pending")
    .is("tech_id", null)
    .select();

  if (!data || data.length === 0) {
    alert("Too late. Another technician accepted this job.");
  }

  this.incomingJob = null;
  this.fetchJobs();
},


async rejectIncoming() {
  const job = this.incomingJob;
  if (!job) return;

  await window.sb
    .from("jobs")
    .update({
      rejected_by: window.sb.sql`
        array_append(coalesce(rejected_by,'{}'), ${this.tech.id})
      `
    })
    .eq("id", job.id);

  this.incomingJob = null;
},
  logout(){
    localStorage.removeItem("active_tech");
    window.location.href = "techniciandashboard.html"; // Changed back to correct path
  },
  scrollToJobs() {
      document.getElementById('jobsSection').scrollIntoView({ behavior: 'smooth' });
  }
}
}
</script>


<div
  x-show="incomingJob"
  x-transition
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-3xl p-6 w-[90%] max-w-sm text-center shadow-2xl">

    <p class="text-xs uppercase tracking-widest text-brand-gold font-bold">
      New Job Arrived
    </p>

    <h3 class="text-xl font-extrabold text-brand-olive mt-2"
        x-text="incomingJob?.category"></h3>

    <p class="text-sm text-gray-600 mt-1"
       x-text="incomingJob?.location"></p>

    <p class="text-xs text-gray-500 italic mt-2"
       x-text="incomingJob?.issue"></p>

    <div class="flex gap-3 mt-6">
      <button
        @click="acceptIncoming()"
        class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 active:scale-95 transition-all shadow-lg shadow-green-600/30">
        Accept
      </button>

      <button
        @click="rejectIncoming()"
        class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 active:scale-95 transition-all shadow-lg shadow-red-500/30">
        Reject
      </button>
    </div>

  </div>
</div>

</body>
</html>

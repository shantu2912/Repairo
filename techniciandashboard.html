<body
x-data="dashboardHandler()"
x-init="init()"
x-cloak
class="font-sans antialiased pb-36"
>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-brand-cream/80 backdrop-blur border-b p-5">
  <div class="max-w-md mx-auto flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-full bg-brand-olive text-white flex items-center justify-center font-bold">
        <span x-text="techName.charAt(0)"></span>
      </div>
      <div>
        <p class="text-[10px] uppercase tracking-widest text-brand-gold font-black">Pro Partner</p>
        <p class="font-serif italic text-lg text-brand-olive" x-text="techName"></p>
      </div>
    </div>
    <button @click="logout()" class="text-brand-olive hover:text-red-500">
      <i class="fa-solid fa-power-off"></i>
    </button>
  </div>
</header>

<main class="max-w-md mx-auto p-6 space-y-8">

<!-- STATS -->
<section>
  <div class="grid grid-cols-2 gap-4">
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Active Jobs</p>
      <h3 class="text-3xl font-extrabold text-brand-olive" x-text="stats.activeJobs"></h3>
    </div>
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Earnings</p>
      <h3 class="text-3xl font-extrabold text-green-700">
        ₹<span x-text="stats.earnings"></span>
      </h3>
    </div>
    <div class="glass-card p-5 rounded-[2rem]">
      <p class="text-[9px] font-bold text-brand-gold uppercase">Today</p>
      <h3 class="text-3xl font-extrabold text-purple-700">
        ₹<span x-text="stats.todayEarnings"></span>
      </h3>
    </div>
    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2 text-xs bg-white px-3 py-2 rounded-xl shadow">
        <input
          type="checkbox"
          class="accent-green-600"
          :checked="available"
          @change="toggleAvailability($event)"
        >
        <span class="font-semibold">Available for Jobs</span>
      </label>
    </div>
  </div>
</section>

<!-- Notification permission banner -->
<div x-show="notifStatus === 'denied'"
     class="bg-red-50 border border-red-200 rounded-2xl p-4 text-xs text-red-700">
  <strong>🔕 Notifications blocked.</strong> You won't receive job alerts.
  Please enable notifications in your browser settings and reload.
</div>

<div x-show="notifStatus === 'prompt'"
     class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 text-xs text-yellow-800">
  <strong>🔔 Enable notifications</strong> to receive instant job alerts.
  <button @click="setupNotifications()" class="ml-2 underline font-bold">Enable now</button>
</div>

<!-- JOBS -->
<section id="jobsSection" class="space-y-4">

  <div x-show="loading" class="text-center text-sm text-brand-dark/50 mt-20">
    Loading jobs…
  </div>

  <div x-show="!loading && jobs.length === 0"
       class="text-center text-sm text-brand-dark/50 mt-20">
    No active jobs
  </div>

  <template x-for="job in jobs" :key="job.id">
    <div class="glass-card p-6 rounded-[2.5rem] border-l-4"
         :class="job.urgent ? 'border-red-500':'border-brand-gold'">

      <!-- TITLE -->
      <span class="text-[9px] font-bold text-brand-gold uppercase" x-text="job.category"></span>
      <h4 class="text-lg font-extrabold text-brand-olive" x-text="job.device"></h4>
      <p class="text-xs italic text-brand-dark/60" x-text="job.issue"></p>

      <!-- CUSTOMER REQUESTED DATE & TIME -->
      <div x-show="formatScheduled(job)"
           class="mt-2 flex items-center gap-2 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
        <span class="text-amber-500 text-sm">📅</span>
        <div>
          <p class="text-[9px] font-bold text-amber-700 uppercase tracking-wide">Customer Requested</p>
          <p class="text-xs font-semibold text-amber-900" x-text="formatScheduled(job)"></p>
        </div>
      </div>

      <p class="text-xs text-gray-500 mt-1">
        Started: <span x-text="formatTime(job.started_at)"></span>
      </p>

      <!-- EARNINGS BADGE -->
      <div x-show="calculateFee(job) > 0"
           class="mt-3 flex items-center justify-between bg-green-50 border border-green-100 rounded-xl px-3 py-2">
        <span class="text-[10px] font-semibold text-green-700 uppercase tracking-wide">Your Earnings</span>
        <span class="font-extrabold text-green-700 text-sm">₹<span x-text="calculateFee(job)"></span></span>
      </div>

      <!-- FOOTER -->
      <div class="flex justify-between items-center border-t mt-4 pt-4">

        <!-- CUSTOMER -->
        <div>
          <p class="text-sm font-bold" x-text="job.customer_name"></p>
          <a
            :href="'tel:' + job.phone"
            class="text-xs text-green-600 font-bold mt-1 block">
            📞 Call Customer
          </a>

          <p class="text-[9px] uppercase text-brand-dark/40" x-text="job.location"></p>
          <button
            @click="openMaps(job.location)"
            class="text-xs text-blue-600 font-bold mt-1">
            Open in Maps →
          </button>

          <p class="text-[9px] font-mono text-red-600 mt-1"
             x-show="job.slaRemaining">
             SLA: <span x-text="job.slaRemaining"></span>
          </p>
        </div>

        <!-- STATUS + ACTION -->
        <div class="flex flex-col items-end gap-2">

          <span
           :class=" job.status === 'pending' ? 'bg-gray-100 text-gray-700' :
                    job.status === 'in_progress' ? 'bg-blue-100 text-blue-700' :
                    job.status === 'arrived' ? 'bg-purple-100 text-purple-700' :
                    'bg-green-100 text-green-700'
                  "
            x-text="job.status.replace('_',' ')"
          ></span>

          <!-- ACCEPT / REJECT (only when job is free) -->
          <button
            x-show="job.status === 'pending'"
            @click="acceptJob(job.id)"
            class="px-4 py-2 bg-green-600 text-white text-xs rounded-xl">
            Accept
          </button>

          <button
            x-show="job.status === 'pending'"
            @click="rejectJob(job.id)"
            class="px-4 py-2 bg-red-500 text-white text-xs rounded-xl">
            Reject
          </button>

          <!-- MARK ARRIVED (after accepting job) -->
          <button
            x-show="job.status === 'in_progress'"
            @click="markArrived(job)"
            class="px-4 py-2 bg-blue-600 text-white text-xs rounded-xl">
            Mark Arrived
          </button>

          <!-- COMPLETE (ONLY after arrival) -->
          <button
            x-show="job.status === 'arrived'"
            @click="completeJob(job)"
            class="px-5 py-2 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase">
            Complete Job
          </button>

        </div>
      </div>
    </div>
  </template>

</section>

</main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50">
  <div class="relative bg-white/90 backdrop-blur border rounded-full px-4 py-3 flex justify-between items-center shadow-2xl">

    <button class="w-12 h-12 text-brand-gold">
      <i class="fa-solid fa-house"></i>
    </button>

    <button @click="scrollToJobs()" class="w-12 h-12 text-brand-olive/40 hover:text-brand-gold">
      <i class="fa-solid fa-box-open"></i>
    </button>

    <div class="w-14 h-12"></div>

    <button onclick="window.location.href='completed_jobs.html'"
            class="w-12 h-12 text-brand-olive/40 hover:text-brand-gold">
      <i class="fa-solid fa-book-open"></i>
    </button>

    <button @click="logout()" class="w-12 h-12 text-brand-olive/40">
      <i class="fa-solid fa-circle-user"></i>
    </button>

    <button
      class="absolute left-1/2 -translate-x-1/2 -top-6
             w-14 h-14 bg-brand-gold rounded-full
             flex items-center justify-center text-white
             shadow-lg border-4 border-white">
      <i class="fa-solid fa-camera"></i>
    </button>

  </div>
</nav>

<!-- 🔔 JOB ALERT MODAL (Alpine-driven) -->
<div
  x-show="incomingJob"
  x-transition
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-3xl p-6 w-[90%] max-w-sm text-center shadow-2xl">

    <p class="text-xs uppercase tracking-widest text-brand-gold font-bold">
      New Job Arrived
    </p>

    <h3 class="text-xl font-extrabold text-brand-olive mt-2"
        x-text="incomingJob?.category"></h3>

    <p class="text-sm text-gray-600 mt-1"
       x-text="incomingJob?.location"></p>

    <p class="text-xs text-gray-500 italic mt-2"
       x-text="incomingJob?.issue"></p>

    <!-- Scheduled time in modal -->
    <div x-show="formatScheduled(incomingJob)"
         class="mt-3 flex items-center justify-center gap-2 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
      <span class="text-amber-500">📅</span>
      <div class="text-left">
        <p class="text-[9px] font-bold text-amber-700 uppercase">Customer Requested</p>
        <p class="text-xs font-semibold text-amber-900" x-text="formatScheduled(incomingJob)"></p>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button
        @click="acceptIncoming()"
        class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">
        Accept
      </button>

      <button
        @click="rejectIncoming()"
        class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold">
        Reject
      </button>
    </div>

  </div>
</div>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixZen Pro | Technician Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<script src="i18n.js"></script>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<!-- Icons / Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'brand-olive': '#5D5646',
        'brand-gold': '#A07D54',
        'brand-cream': '#F8F5F0',
        'brand-dark': '#2D2B28',
        'brand-beige': '#DFD4C3'
      }
    }
  }
}
</script>
<style>
[x-cloak]{display:none}
body{background:#F8F5F0;color:#2D2B28}
.glass-card{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(18px);
  border:1px solid #fff;
  box-shadow:0 15px 35px rgba(93,86,70,.08)
}
</style>
<script src="techniciandashboard.js"></script>
<!-- ✅ SUPABASE CLIENT -->

<!-- 🔔 JOB ALERT MODAL (Alpine-driven) -->
<div
  x-show="incomingJob"
  x-transition
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-3xl p-6 w-[90%] max-w-sm text-center shadow-2xl">

    <p class="text-xs uppercase tracking-widest text-brand-gold font-bold">
      New Job Arrived
    </p>

    <h3 class="text-xl font-extrabold text-brand-olive mt-2"
        x-text="incomingJob?.category"></h3>

    <p class="text-sm text-gray-600 mt-1"
       x-text="incomingJob?.location"></p>

    <p class="text-xs text-gray-500 italic mt-2"
       x-text="incomingJob?.issue || incomingJob?.other_issue"></p>

    <div class="flex gap-3 mt-6">
      <button
        @click="acceptIncoming()"
        class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">
        Accept
      </button>

      <button
        @click="rejectIncoming()"
        class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold">
        Reject
      </button>
    </div>

  </div>
</div>

</body>
</html>

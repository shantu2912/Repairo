<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rate Your Experience | FixZen</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-olive': '#5D5646',
                        'brand-gold': '#A07D54',
                        'brand-cream': '#EEEAE2',
                        'brand-dark': '#4D4C4B'
                    },
                    boxShadow: {
                        'super-float': '0 20px 50px rgba(93, 86, 70, 0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #EEEAE2; color: #4D4C4B; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .tag-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4" x-data="feedbackApp()">

    <div x-show="!submitted" 
         class="w-full max-w-md glass-card rounded-[3rem] p-8 shadow-super-float animate__animated animate__fadeInUp">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand-olive text-white rounded-2xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-lg">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-brand-olive tracking-tight">How was FixZen?</h1>
            <p class="text-xs font-bold text-brand-gold uppercase tracking-[0.2em] mt-1">Service Feedback</p>
        </div>

        <div x-show="step === 1" class="animate__animated animate__fadeIn">
            <div class="flex justify-between items-center mb-10 px-2">
                <template x-for="i in 5">
                    <button @click="rating = i" class="group relative transition-all duration-300 active:scale-90">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center transition-all"
                             :class="i <= rating ? 'bg-brand-gold text-white shadow-md' : 'bg-white text-brand-olive/30 border border-brand-olive/10'">
                            <i :class="getEmoji(i)" class="text-xl"></i>
                        </div>
                        <span x-show="rating === i" 
                              class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[9px] font-black text-brand-gold whitespace-nowrap uppercase tracking-tighter"
                              x-text="getLabel(i)"></span>
                    </button>
                </template>
            </div>

            <div x-show="rating >= 3" class="flex flex-wrap justify-center gap-2 mb-8 animate__animated animate__fadeIn">
                <template x-for="tag in availableTags">
                    <button @click="toggleTag(tag)" 
                            :class="selectedTags.includes(tag) ? 'bg-brand-olive text-white scale-105' : 'bg-white text-brand-olive border border-brand-olive/5'"
                            class="px-4 py-2 rounded-full text-[11px] font-extrabold transition-all shadow-sm">
                        <span x-text="tag"></span>
                    </button>
                </template>
            </div>

            <button @click="step = 2" :disabled="rating === 0" 
                    class="w-full py-4 bg-brand-olive text-white rounded-2xl font-extrabold shadow-lg disabled:opacity-20 transition-all active:scale-95 uppercase tracking-widest text-xs">
                Next Step
            </button>
        </div>

        <div x-show="step === 2" class="animate__animated animate__fadeIn">
            <textarea x-model="comment" 
                      placeholder="Write a small note for the partner..."
                      class="w-full h-32 bg-white/50 border border-brand-olive/5 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-brand-gold outline-none mb-4 resize-none"></textarea>
            
            <button @click="submitReview" 
                    :disabled="loading"
                    class="w-full py-4 bg-brand-gold text-white rounded-2xl font-extrabold shadow-lg transition-all active:scale-95 uppercase tracking-widest text-xs">
                <span x-show="!loading">Finish & Reward Partner</span>
                <i x-show="loading" class="fa-solid fa-circle-notch animate-spin"></i>
            </button>
            <button @click="step = 1" class="w-full mt-4 text-[10px] font-bold text-brand-olive/40 uppercase">Go Back</button>
        </div>
    </div>

    <div x-show="submitted" 
         class="fixed inset-0 z-[500] bg-brand-olive flex items-center justify-center p-6 text-center"
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0 scale-110"
         x-transition:enter-end="opacity-100 scale-100">
        
        <div class="relative">
            <div class="w-24 h-24 bg-brand-gold rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_50px_rgba(160,125,84,0.5)] animate__animated animate__backInDown">
                <i class="fa-solid fa-coins text-4xl text-white"></i>
            </div>
            
            <h2 class="text-3xl font-black text-white mb-2 tracking-tight">Success!</h2>
            <p class="text-brand-cream/60 text-sm max-w-[200px] mx-auto leading-relaxed">Your review helped the partner earn bonus tokens.</p>
            
            <button @click="window.location.href='index.html'" 
                    class="mt-10 px-8 py-3 bg-white text-brand-olive rounded-full font-black text-[10px] uppercase tracking-[0.2em] hover:bg-brand-gold hover:text-white transition-colors">
                Back to Home
            </button>
        </div>
    </div>

    <script>
        function feedbackApp() {
            // Configuration using your Supabase credentials
            const sb = supabase.createClient(
                "https://kzxdxnxgouthsywbsnvl.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6eGR4bnhnb3V0aHN5d2JzbnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTczMzIsImV4cCI6MjA4MTg5MzMzMn0.nqzn89vmTFKVNuZPHfGRxdTg6UHT6GMud238rr49qag"
            );

            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('job_id');

            return {
                step: 1,
                rating: 0,
                comment: '',
                selectedTags: [],
                loading: false,
                submitted: false,
                availableTags: ['Fast Arrival', 'Professional', 'Clean Work', 'Polite', 'Genuine Parts'],

                getEmoji(i) {
                    return ['fa-face-frown', 'fa-face-meh', 'fa-face-smile', 'fa-face-laugh-beam', 'fa-face-grin-stars'][i-1];
                },

                getLabel(i) {
                    return ['Poor', 'Fair', 'Good', 'Excellent', 'Incredible'][i-1];
                },

                toggleTag(tag) {
                    if (this.selectedTags.includes(tag)) {
                        this.selectedTags = this.selectedTags.filter(t => t !== tag);
                    } else {
                        this.selectedTags.push(tag);
                    }
                },

                async submitReview() {
                    if (!jobId) return alert("Error: No Job ID found.");
                    this.loading = true;

                    // Combine tags with comment
                    const combinedFeedback = this.selectedTags.length > 0 
                        ? `[${this.selectedTags.join(', ')}] ${this.comment}`
                        : this.comment;

                    const { error } = await sb.from('feedback').insert([{
                        job_id: jobId,
                        rating: this.rating,
                        comment: combinedFeedback
                    }]);

                    if (error) {
                        alert(error.message);
                        this.loading = false;
                    } else {
                        // Mark job as feedback given
                        await sb.from('jobs').update({ feedback_provided: true }).eq('id', jobId);
                        
                        this.loading = false;
                        this.submitted = true;
                        
                        // Haptic feedback for mobile users
                        if (navigator.vibrate) navigator.vibrate(200);
                    }
                }
            }
        }
    </script>
</body>
</html>
